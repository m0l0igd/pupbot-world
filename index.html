<style>

/* ── TOUCH UI (portrait) ─────────────────────────────────────────── */
#touch-ui{position:fixed;bottom:0;left:0;right:0;height:170px;pointer-events:none;
           display:none;z-index:999;padding-bottom:env(safe-area-inset-bottom)}
/* D-pad: cross layout bottom-left */
#dpad{position:absolute;bottom:8px;left:8px;
      display:grid;grid-template-columns:50px 50px 50px;
      grid-template-rows:50px 50px 50px;gap:3px;pointer-events:all}
/* Right cluster: jump + blast */
#tr{position:absolute;bottom:8px;right:8px;
    display:flex;flex-direction:row;gap:8px;pointer-events:all}
/* Centre: START + SPEC stacked, sitting above the d-pad/tr row */
#centre-btns{position:absolute;bottom:10px;left:50%;
             transform:translateX(-50%);pointer-events:all;
             display:flex;flex-direction:column;gap:6px;align-items:center}
.tb{width:50px;height:50px;border-radius:50%;
    background:rgba(136,0,0,.35);
    border:2px solid rgba(220,60,60,.5);color:rgba(255,180,180,.9);font-size:18px;
    display:flex;align-items:center;justify-content:center;
    user-select:none;cursor:pointer;touch-action:none;
    box-shadow:0 0 12px rgba(136,0,0,.4);transition:background .1s}
.tb:active,.tb.pressed{background:rgba(180,0,0,.6);border-color:rgba(255,100,100,.9)}
.dpad-empty{width:50px;height:50px;} /* invisible spacer for d-pad corners */
.ctb{width:72px!important;height:32px!important;border-radius:10px!important;
     font-size:10px!important;font-weight:bold;font-family:monospace}
.dpe{opacity:.92;font-size:17px!important;background:rgba(120,20,20,.55)!important;
     border-color:rgba(255,80,80,.65)!important;font-weight:bold!important}

/* ── LANDSCAPE: single thin strip, full-width canvas ─────────────── */
@media(orientation:landscape){
  body{justify-content:flex-start;padding-top:0;align-items:flex-start}
  #touch-ui{height:80px}
  /* D-pad: exact px — NO transform so touch areas = visual areas */
  #dpad{grid-template-columns:32px 32px 32px;
        grid-template-rows:32px 32px 32px;
        gap:2px;bottom:6px;left:8px}
  .dpad-empty{width:32px!important;height:32px!important;
              background:none!important;border:none!important;box-shadow:none!important}
  .tb{width:32px!important;height:32px!important;font-size:12px!important;
      border-width:1px!important;border-radius:8px!important}
  #tr{bottom:22px;right:10px;gap:10px;flex-direction:row!important}
  #centre-btns{bottom:22px;gap:8px;flex-direction:row!important}
  .ctb{width:56px!important;height:32px!important;font-size:9px!important;border-radius:8px!important}
}
</style></head><body>

<script>
'use strict';
var cv=document.getElementById('c');
var isTouch=('ontouchstart' in window)||navigator.maxTouchPoints>0;
var W,H,g;
function resizeCanvas(){
  var landscape=innerWidth>innerHeight;
  if(isTouch&&landscape){
    W=innerWidth; H=innerHeight-80;
  } else if(isTouch){
    W=innerWidth; H=innerHeight-170;

}

g=cv.getContext('2d');

  this.beginPath();this.moveTo(x+r,y);this.lineTo(x+w-r,y);this.arcTo(x+w,y,x+w,y+r,r);
  this.lineTo(x+w,y+h-r);this.arcTo(x+w,y+h,x+w-r,y+h,r);
  this.lineTo(x+r,y+h);this.arcTo(x,y+h,x,y+h-r,r);this.lineTo(x,y+r);this.arcTo(x,y,x+r,y,r);this.closePath();return this;};
var FLOOR=H-70,WORLD=5500,GR=0.52;

// ── AUDIO ──────────────────────────────────────────────────────
var _ac=null;
function AC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;}
function tn(f,d,t,v){try{var a=AC(),o=a.createOscillator(),gn=a.createGain();o.type=t||'square';o.frequency.value=f;gn.gain.setValueAtTime(v||.18,a.currentTime);gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.connect(gn);gn.connect(a.destination);o.start();o.stop(a.currentTime+d+.05);}catch(e){}}
function ns(d,v,fr){try{var a=AC(),b=a.createBuffer(1,a.sampleRate*.5,a.sampleRate),dt=b.getChannelData(0);for(var i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;var s=a.createBufferSource(),f=a.createBiquadFilter(),gn=a.createGain();s.buffer=b;f.type='bandpass';f.frequency.value=fr||300;gn.gain.setValueAtTime(v||.3,a.currentTime);gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);s.connect(f);f.connect(gn);gn.connect(a.destination);s.start();s.stop(a.currentTime+d+.05);}catch(e){}}
var SFX={jump:function(){tn(200,.05,'square',.15);setTimeout(function(){tn(260,.08,'square',.12);},50);},stomp:function(){ns(.15,.4,140);tn(90,.1,'sine',.22);},hurt:function(){tn(130,.22,'sawtooth',.28);ns(.18,.22,180);},soul:function(){tn(880,.07,'sine',.12);setTimeout(function(){tn(1100,.09,'sine',.1);},80);},oneup:function(){[330,392,523,659,784].forEach(function(f,i){setTimeout(function(){tn(f,.14,'sine',.18);},i*80);});},blast:function(){tn(600,.05,'sine',.18);ns(.06,.18,600);},sword:function(){ns(.18,.3,500);tn(200,.12,'sawtooth',.18);},slam:function(){ns(.25,.45,100);tn(70,.3,'sine',.3);},groan:function(){tn(60+Math.random()*30,.5,'sawtooth',.12);},thunder:function(){ns(.4,.5,60);tn(40,.5,'sawtooth',.35);setTimeout(function(){ns(.2,.3,80);},200);},boss:function(){ns(.3,.35,100);tn(55,.45,'sawtooth',.3);},win:function(){[330,415,523,659,784].forEach(function(f,i){setTimeout(function(){tn(f,.28,'sine',.18);},i*160);});},
menuSel:function(){try{var a=AC();
  // 40 Hz sub-bass thump
  var o1=a.createOscillator(),g1=a.createGain();o1.type='sine';o1.frequency.value=40;
  g1.gain.setValueAtTime(.55,a.currentTime);g1.gain.exponentialRampToValueAtTime(.001,a.currentTime+.18);
  o1.connect(g1);g1.connect(a.destination);o1.start();o1.stop(a.currentTime+.2);
  // Upward sweep 180 → 900 Hz
  var o2=a.createOscillator(),g2=a.createGain();o2.type='sawtooth';
  o2.frequency.setValueAtTime(180,a.currentTime);o2.frequency.exponentialRampToValueAtTime(900,a.currentTime+.14);
  g2.gain.setValueAtTime(.18,a.currentTime);g2.gain.exponentialRampToValueAtTime(.001,a.currentTime+.18);
  o2.connect(g2);g2.connect(a.destination);o2.start();o2.stop(a.currentTime+.2);
  // Bright ding
  var o3=a.createOscillator(),g3=a.createGain();o3.type='sine';o3.frequency.value=1800;
  g3.gain.setValueAtTime(.12,a.currentTime+.1);g3.gain.exponentialRampToValueAtTime(.001,a.currentTime+.32);
  o3.connect(g3);g3.connect(a.destination);o3.start(a.currentTime+.1);o3.stop(a.currentTime+.35);
}catch(e){}},
special:function(){try{var a=AC(),o=a.createOscillator(),gn=a.createGain();o.type='sawtooth';o.frequency.setValueAtTime(55,a.currentTime);o.frequency.exponentialRampToValueAtTime(1100,a.currentTime+.5);gn.gain.setValueAtTime(.32,a.currentTime);gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+.7);o.connect(gn);gn.connect(a.destination);o.start();o.stop(a.currentTime+.75);}catch(e){}ns(.5,.55,160);setTimeout(function(){ns(.22,.4,90);tn(80,.2,'sine',.3);},320);setTimeout(function(){tn(1320,.12,'sine',.2);tn(1760,.09,'sine',.14);},500);}};

// ── MUSIC  (MJ Thriller-inspired — A minor, 118 BPM) ──────────
var musicOn=false;
function startMusic(){
  if(musicOn)return;musicOn=true;
  var ac=AC();
  var B=60/118;            // one beat in seconds
  var BARS=8;              // loop length in bars
  var LOOP=BARS*4*B;       // loop length in seconds

  // Master chain
  var master=ac.createGain();master.gain.value=.19;
  var cmp=ac.createDynamicsCompressor();cmp.threshold.value=-16;cmp.ratio.value=6;
  master.connect(cmp);cmp.connect(ac.destination);

  // Reverb
  var rlen=ac.sampleRate*2,rbuf=ac.createBuffer(2,rlen,ac.sampleRate);
  for(var rch=0;rch<2;rch++){var rd=rbuf.getChannelData(rch);for(var ri2=0;ri2<rlen;ri2++)rd[ri2]=(Math.random()*2-1)*Math.pow(1-ri2/rlen,3);}
  var rev=ac.createConvolver();rev.buffer=rbuf;
  var rg=ac.createGain();rg.gain.value=.28;rev.connect(rg);rg.connect(master);

  // Pre-baked noise buffers
  function mkNoise(sec){var b=ac.createBuffer(1,Math.ceil(ac.sampleRate*sec),ac.sampleRate),d=b.getChannelData(0);for(var i2=0;i2<d.length;i2++)d[i2]=Math.random()*2-1;return b;}
  var snBuf=mkNoise(.15), hatBuf=mkNoise(.06);

  // --- Drum helpers ---
  function kick(t){
    var o=ac.createOscillator(),g=ac.createGain();
    o.type='sine';o.frequency.setValueAtTime(180,t);o.frequency.exponentialRampToValueAtTime(38,t+.14);
    g.gain.setValueAtTime(.75,t);g.gain.exponentialRampToValueAtTime(.001,t+.28);
    o.connect(g);g.connect(master);o.start(t);o.stop(t+.32);
  }
  function snare(t){
    var s=ac.createBufferSource(),f=ac.createBiquadFilter(),g=ac.createGain();
    s.buffer=snBuf;f.type='bandpass';f.frequency.value=2800;f.Q.value=.6;
    g.gain.setValueAtTime(.38,t);g.gain.exponentialRampToValueAtTime(.001,t+.18);
    s.connect(f);f.connect(g);g.connect(master);s.start(t);s.stop(t+.22);
    var o=ac.createOscillator(),og=ac.createGain();
    o.type='sine';o.frequency.value=190;og.gain.setValueAtTime(.1,t);og.gain.exponentialRampToValueAtTime(.001,t+.07);
    o.connect(og);og.connect(master);o.start(t);o.stop(t+.1);
  }
  function hat(t,v){
    var s=ac.createBufferSource(),f=ac.createBiquadFilter(),g=ac.createGain();
    s.buffer=hatBuf;f.type='highpass';f.frequency.value=9000;
    g.gain.setValueAtTime(v||.11,t);g.gain.exponentialRampToValueAtTime(.001,t+.07);
    s.connect(f);f.connect(g);g.connect(master);s.start(t);s.stop(t+.09);
  }
  function openHat(t){
    var s=ac.createBufferSource(),f=ac.createBiquadFilter(),g=ac.createGain();
    s.buffer=mkNoise(.22);f.type='highpass';f.frequency.value=7000;
    g.gain.setValueAtTime(.13,t);g.gain.exponentialRampToValueAtTime(.001,t+.22);
    s.connect(f);f.connect(g);g.connect(master);s.start(t);s.stop(t+.26);
  }

  // --- Tone helper ---
  function tone(freq,start,dur,type,vol,dest){
    var o=ac.createOscillator(),g=ac.createGain();
    o.type=type||'sawtooth';o.frequency.value=freq;
    g.gain.setValueAtTime(0,start);g.gain.linearRampToValueAtTime(vol||.15,start+.01);
    g.gain.exponentialRampToValueAtTime(.001,start+dur);
    o.connect(g);g.connect(dest||master);if(dest!==false){g.connect(rev);}
    o.start(start);o.stop(start+dur+.06);
  }

  // --- Schedule 8-bar block starting at t ---
  function schedule(t){
    // A minor frequencies
    var A2=110,C3=130.81,D3=146.83,E3=164.81,F3=174.61,G3=196,
        A3=220,B3=246.94,C4=261.63,D4=293.66,E4=329.63,F4=349.23,G4=392;

    for(var bar=0;bar<BARS;bar++){
      var bt=t+bar*4*B;
      // Kick: 1, and-of-2 (ghost), 3, and-of-4
      kick(bt);kick(bt+2*B);
      if(bar%2===0)kick(bt+1.5*B);
      else         kick(bt+3.5*B);
      // Snare: 2 and 4
      snare(bt+B);snare(bt+3*B);
      // Thriller snare ghost on the 'e of 3'
      if(bar%4===1||bar%4===3){var gs=ac.createBufferSource(),gf=ac.createBiquadFilter(),gg=ac.createGain();gs.buffer=snBuf;gf.type='bandpass';gf.frequency.value=2400;gg.gain.setValueAtTime(.1,bt+2.25*B);gg.gain.exponentialRampToValueAtTime(.001,bt+2.4*B);gs.connect(gf);gf.connect(gg);gg.connect(master);gs.start(bt+2.25*B);gs.stop(bt+2.5*B);}
      // 16th-note hi-hats; open hat on and-of-4
      for(var h=0;h<8;h++)hat(bt+h*.5*B,h%2===0?.13:.07);
      openHat(bt+3.5*B);
    }

    // Thriller-inspired bass riff (A minor, 8 bars)
    [
      [A2,0,.9],[A2,.75,.4],[C3,1,.9],[E3,1.75,.4],
      [D3,2,.9],[C3,2.75,.4],[A2,3,.9],[0,0,0],
      [A2,4,.9],[A2,4.75,.4],[E3,5,.9],[E3,5.75,.4],
      [F3,6,.9],[E3,6.75,.4],[D3,7,.5],[C3,7.5,.4],
      [A2,8,.9],[A2,8.75,.4],[C3,9,.9],[E3,9.75,.4],
      [D3,10,.9],[C3,10.75,.4],[A2,11,.9],[G3,11.5,.4],
      [A2,12,.9],[A2,12.5,.4],[C3,13,.9],[D3,13.5,.4],
      [E3,14,.9],[D3,14.5,.4],[C3,15,.5],[A2,15.5,.4]
    ].forEach(function(n){
      if(!n[0])return;
      var lp=ac.createBiquadFilter();lp.type='lowpass';lp.frequency.value=520;
      tone(n[0],t+n[1]*B,n[2]*B,'sawtooth',.20,lp);lp.connect(master);
    });

    // Organ chord stabs — Am F C E7 (Thriller vibe)
    [[A3,0],[F3,4],[C3,6],[E3,7]].forEach(function(c,ci){
      var cht=t+c[1]*2*B;
      [[220,261.63,329.63],[174.61,220,261.63],[130.81,164.81,196],[164.81,220,246.94]][ci]
        .forEach(function(f){tone(f,cht,2.5*B,'sine',.045,rev);});
    });

    // Haunting Thriller lead melody (E-D-C-B-A motif)
    [
      [E4,0,.4],[D4,.5,.2],[C4,.75,.4],[B3,1.25,.2],[A3,1.5,.7],
      [E4,4,.4],[D4,4.4,.2],[C4,4.7,.3],[D4,5,.3],[C4,5.4,.4],[A3,5.9,.6],
      [F4,8,.5],[E4,8.6,.2],[D4,9,.4],[C4,9.5,.2],[A3,9.8,.8],
      [G4,12,.25],[E4,12.4,.25],[D4,12.75,.4],[C4,13.2,.2],[B3,13.5,.3],[A3,13.9,.5]
    ].forEach(function(n){
      tone(n[0],t+n[1]*B,n[2]*B,'square',.07,master);
    });
  }

  // Kick off + seamless loop
  var _nextT=ac.currentTime+.08;
  function tick(){schedule(_nextT);_nextT+=LOOP;setTimeout(tick,(LOOP-.12)*1000);}
  tick();
}

// ── CHARACTER SELECT THEMES ─────────────────────────────────────
var _cGen=0;// generation counter — incrementing stops all loops

function stopCharTheme(){_cGen++;}

function playCharTheme(ci){
  _cGen++;var myGen=_cGen;
  if(!musicOn)return;// don't fight startMusic unlock
  var a=AC();
  if(a.state==='suspended')a.resume();

  // Shared helpers
  function t(freq,st,dur,type,vol){
    if(_cGen!==myGen)return;
    var o=a.createOscillator(),g=a.createGain();
    o.type=type||'sine';o.frequency.value=freq;
    g.gain.setValueAtTime(0,st);g.gain.linearRampToValueAtTime(vol||.1,st+.01);
    g.gain.exponentialRampToValueAtTime(.001,st+dur);
    o.connect(g);g.connect(a.destination);o.start(st);o.stop(st+dur+.05);
  }
  function k(st){// kick
    var o=a.createOscillator(),g=a.createGain();o.type='sine';
    o.frequency.setValueAtTime(160,st);o.frequency.exponentialRampToValueAtTime(40,st+.1);
    g.gain.setValueAtTime(.45,st);g.gain.exponentialRampToValueAtTime(.001,st+.18);
    o.connect(g);g.connect(a.destination);o.start(st);o.stop(st+.22);
  }
  function sn(st){// snare noise
    try{var ab=a.createBuffer(1,Math.ceil(a.sampleRate*.12),a.sampleRate),d=ab.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    var s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();
    s.buffer=ab;f.type='bandpass';f.frequency.value=2600;
    g.gain.setValueAtTime(.28,st);g.gain.exponentialRampToValueAtTime(.001,st+.14);
    s.connect(f);f.connect(g);g.connect(a.destination);s.start(st);s.stop(st+.16);}catch(e){}
  }
  function hat(st,v){
    try{var ab=a.createBuffer(1,Math.ceil(a.sampleRate*.05),a.sampleRate),d=ab.getChannelData(0);
    for(var i=0;i<d.length;i++)d[i]=Math.random()*2-1;
    var s=a.createBufferSource(),f=a.createBiquadFilter(),g=a.createGain();
    s.buffer=ab;f.type='highpass';f.frequency.value=8000;
    g.gain.setValueAtTime(v||.09,st);g.gain.exponentialRampToValueAtTime(.001,st+.06);
    s.connect(f);f.connect(g);g.connect(a.destination);s.start(st);s.stop(st+.08);}catch(e){}
  }

  var themes=[

    // 0 REMI — "Eye of the Tiger" (Survivor) — C minor, 108 BPM
    function(base,loop){var B=60/108;
      // Driving rock drums
      [0,1,2,3].forEach(function(i){k(base+i*B);});
      [1,3].forEach(function(i){sn(base+i*B);});

      // Iconic guitar riff: C-C-C-Bb-C | Ab-C | Bb-Ab

       [415.3,1,.22],[523.3,1.33,.18],[466.2,1.67,.22],[415.3,2,.44],
       [392,2.67,.15],[349.2,3,.33]
      ].forEach(function(n){t(n[0],base+n[1]*B,n[2]*B,'sawtooth',.16);
                             t(n[0]/2,base+n[1]*B,n[2]*B,'sawtooth',.12);});
      // Punchy bass pedal C2
      [[130.8,0,.4],[130.8,1,.4],[130.8,2,.4],[130.8,3,.6]
      ].forEach(function(n){t(n[0],base+n[1]*B,n[2]*B,'sawtooth',.2);});
      setTimeout(function(){if(_cGen===myGen)themes[0](a.currentTime,(loop||0)+1);},
        (4*B-.08)*1000);
    },

    // 1 MJ — "Billie Jean" (Michael Jackson) — F# minor, 117 BPM
    function(base,loop){var B=60/117;
      // Billie Jean kick pattern: on 1, and-of-2, and-of-3
      k(base);k(base+B*1.5);k(base+B*2.5);k(base+B*3.5);
      sn(base+B);sn(base+B*3);
      for(var h=0;h<16;h++)hat(base+h*B*.25,.09);
      // ICONIC bass riff: F#2-F#2-A2-C#3-F#2-E2
      [[92.5,0,.12],[92.5,.25,.08],[110,.5,.12],[138.6,.75,.15],

// Falls back to localStorage when running as file://
// ══════════════════════════════════════════════════════════
var HS_KEY='doghouse_hs_v1';
var HS_MAX=20;
var _hsCache=[];          // always-fresh copy polled from server
var _hsServerOk=false;    // true once server replied at least once
var _hsPollHandle=null;

// ── Sort helper ─────────────────────────────────────────────
function hsSort(list){
  return list.slice().sort(function(a,b){
    if(b.score!==a.score)return b.score-a.score;
    if(b.stage!==a.stage)return b.stage-a.stage;
    return (b.won?1:0)-(a.won?1:0);
  });
}

// ── localStorage helpers (fallback) ─────────────────────────
function lsLoad(){try{return JSON.parse(localStorage.getItem(HS_KEY)||'[]');}catch(e){return[];}}
function lsSave(list){localStorage.setItem(HS_KEY,JSON.stringify(list));}

// ── Seed cache from localStorage until server responds ───────
_hsCache=hsSort(lsLoad());

// ── Poll server every 8 s ────────────────────────────────────
function hsPoll(){
  fetch('/api/scores').then(function(r){
    if(!r.ok)throw new Error('bad');
    return r.json();
  }).then(function(list){
    _hsServerOk=true;
    _hsCache=list;           // server already sorted
    lsSave(list);            // keep localStorage in sync as backup
  }).catch(function(){
    // server unreachable — use localStorage
    if(!_hsServerOk)_hsCache=hsSort(lsLoad());
  });
}
hsPoll();
_hsPollHandle=setInterval(hsPoll,8000);

// ── Does this score qualify? ─────────────────────────────────
function hsQualifies(score){
  if(_hsCache.length<HS_MAX)return true;
  return score>_hsCache[_hsCache.length-1].score;
}

// ── Submit a score (API first, localStorage fallback) ────────
function hsInsert(name,score,stageNum,won,cb){
  var today=new Date();
  var ds=(today.getMonth()+1)+'/'+today.getDate()+'/'+String(today.getFullYear()).slice(2);
  var entry={name:name.toUpperCase().slice(0,3),score:score,stage:stageNum+1,won:!!won,date:ds};
  // Optimistic local update
  var merged=hsSort(_hsCache.concat([entry])).slice(0,HS_MAX);
  _hsCache=merged;lsSave(merged);
  if(cb)cb();
  // Also POST to server
  if(location.protocol!=='file:'){
    fetch('/api/scores',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({name:entry.name,score:score,stage:entry.stage,won:!!won})
    }).then(function(){hsPoll();}).catch(function(){});
  }
}

// ── Recovery via #reset hash ─────────────────────────────────
(function(){
  if(location.hash==='#reset'){
    localStorage.removeItem(HS_KEY);_hsCache=[];
    if(_hsServerOk){fetch('/api/scores',{method:'DELETE'}).catch(function(){});}
    if(history.replaceState)history.replaceState(null,'',location.pathname);
  }
})();

// ── GENERATE STAGE ────────────────────────────────────────────
function genStage(si){
  _s=si*13+7;platforms=[];graves=[];souls=[];vials=[];enemies=[];weapons=[];powerups=[];obstacles=[];
  var sc=STAGES[si];
  platforms.push({x:0,y:FLOOR,w:WORLD,h:20,ground:true});
  // Tier heights: low = 1 jump, high = chain jump needed
  var LOW_MIN=55, LOW_MAX=Math.floor(FLOOR*0.35);          // 35% of floor height
  var HI_MIN=Math.floor(FLOOR*0.35), HI_MAX=Math.floor(FLOOR*0.75); // up to 75%
  var px=260;
  while(px<WORLD-500){
    var pw=ri(70,170);
    // Alternate low/high tiers so player can chain up
    var tier=Math.floor(px/600)%2;
    var py=FLOOR-ri(tier===0?LOW_MIN:HI_MIN, tier===0?LOW_MAX:HI_MAX);
    py=Math.max(py, 50);  // never above HUD
    platforms.push({x:px,y:py,w:pw,h:14,ground:false});
    // Souls on platforms
    for(var sx2=px+12;sx2<px+pw-12;sx2+=28)if(rnd()<.55)souls.push({x:sx2,y:py-22,alive:true,bob:rnd()*6.28});
    if(rnd()<.14)vials.push({x:px+pw/2,y:py-26,alive:true});
    // Weapon pickup on some platforms
    if(rnd()<.35)weapons.push({x:px+pw/2,y:py-26,alive:true,type:ri(0,WEAPONS.length),bob:rnd()*6.28});
    // Power-up on some platforms
    if(rnd()<.18)powerups.push({x:px+pw*.3,y:py-26,alive:true,type:ri(0,POWERUPS.length),bob:rnd()*6.28});
    // Zombies ON platforms
    if(rnd()<.6){
      var pet=ZT[ri(0,ZT.length)];
      enemies.push({x:px+pw/2-pet.sz/2,y:py-pet.sz,vx:-pet.spd,vy:0,w:pet.sz,h:pet.sz,dir:-1,
        alive:true,deathAnim:0,stunTimer:0,hp:pet.hp,initHp:pet.hp,col:pet.col,eye:pet.eye,spd:pet.spd,pts:pet.pts});
    }
    px+=ri(110,260);
  }
  // More coins along the ground
  for(var ci=80;ci<WORLD-100;ci+=40+ri(0,40)){
    souls.push({x:ci,y:FLOOR-18,alive:true,bob:rnd()*6.28});
  }
  // Weapon pickups along ground
  for(var wi=300;wi<WORLD-300;wi+=ri(280,420)){
    weapons.push({x:wi,y:FLOOR-24,alive:true,type:ri(0,WEAPONS.length),bob:rnd()*6.28});
  }
  // Power-ups along ground
  for(var pi2=400;pi2<WORLD-400;pi2+=ri(450,700)){
    powerups.push({x:pi2,y:FLOOR-24,alive:true,type:ri(0,POWERUPS.length),bob:rnd()*6.28});
  }
  // Graves — more spawners, spread across world
  for(var gi=0;gi<40;gi++){
    var gx=400+gi*(WORLD/42)+ri(-60,60);
    var zt=ZT[ri(0,ZT.length)];
    graves.push({x:gx,y:FLOOR,state:'idle',timer:0,emergeY:0,zombie:null,type:zt,shakeX:0});
  }
  // Obstacles on ground (must jump over; enemies bounce off)
  var OTYPES=[
    {t:'wall', w:24,h:74,col:'#5a4a38',col2:'#3a2a18'},
    {t:'crate',w:36,h:52,col:'#9a6a38',col2:'#6a4a20'},
    {t:'fence',w:16,h:84,col:'#6a5030',col2:'#8a7050'},
    {t:'barrel',w:30,h:56,col:'#2a4a60',col2:'#1a2a40'},
    {t:'slab', w:44,h:42,col:'#504840',col2:'#302820'},
  ];
  var ox=320;
  while(ox<WORLD-600){
    var ot=OTYPES[ri(0,OTYPES.length)];
    obstacles.push({x:ox,y:FLOOR-ot.h,w:ot.w,h:ot.h,t:ot.t,col:ot.col,col2:ot.col2});
    ox+=ri(180,360);
  }
  // Patrol enemies on ground — 10, well spaced, alternating directions
  for(var ei=0;ei<10;ei++){
    var et=ZT[ri(0,ZT.length)];var ex=400+ei*450+ri(-60,60);
    var ey=ei%2===0?FLOOR-et.sz:FLOOR-et.sz;
    enemies.push({x:ex,y:ey,vx:(ei%2===0?1:-1)*et.spd,vy:0,w:et.sz,h:et.sz,dir:ei%2===0?1:-1,
      alive:true,deathAnim:0,stunTimer:0,hp:et.hp,initHp:et.hp,col:et.col,eye:et.eye,spd:et.spd,pts:et.pts});
  }
  // Boss — always 8 hits
  var BOSS_X=WORLD-750;
  var bc=sc.boss;
  boss.x=BOSS_X;boss.y=FLOOR-115;boss.vx=1.8;boss.vy=0;
  boss.hp=20;boss.maxHp=20;boss.alive=true;boss.active=false;boss.dead=false;boss.deathTimer=0;
  boss.dir=1;boss.timer=0;boss.hitTimer=0;boss.projs=[];boss.shockwaves=[];
  boss.swingAngle=0;boss.swinging=false;boss.swingCd=100;boss.swingTimer=0;

// ── DRAW BACKGROUND ───────────────────────────────────────────
function drawBG(){
  var sc=STAGES[stage];
  var sk=g.createLinearGradient(0,0,0,FLOOR);
  sk.addColorStop(0,sc.sky[0]);sk.addColorStop(1,sc.sky[1]);
  g.fillStyle=sk;g.fillRect(0,0,W,H);

  if(sc.sunny){
    // Sun
    fC(W*.15,60,38,'#ffe066');
    var sg=g.createRadialGradient(W*.15,60,30,W*.15,60,80);sg.addColorStop(0,'rgba(255,220,0,.2)');sg.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=sg;g.beginPath();g.arc(W*.15,60,80,0,6.28);g.fill();
  }else{
    // Blood moon
    var mx=W*.78,my=62;
    var mg=g.createRadialGradient(mx,my,0,mx,my,36);mg.addColorStop(0,'#cc3322');mg.addColorStop(.6,'#880808');mg.addColorStop(1,'#440000');
    g.fillStyle=mg;g.beginPath();g.arc(mx,my,36,0,6.28);g.fill();
    var gw=g.createRadialGradient(mx,my,28,mx,my,80);gw.addColorStop(0,'rgba(140,20,10,.22)');gw.addColorStop(1,'rgba(0,0,0,0)');
    g.fillStyle=gw;g.beginPath();g.arc(mx,my,80,0,6.28);g.fill();
    // Stars
    for(var i=0;i<40;i++){var bx2=(i*137)%W,by2=(i*97)%(FLOOR*.8);g.globalAlpha=.4+.4*Math.abs(Math.sin(tick*.03+i));fC(bx2,by2,1,'white');g.globalAlpha=1;}
  }

  // Castle stage — stone walls background
  if(sc.castle){
    for(var ci=0;ci<8;ci++){
      var cwx=ci*(W/7)-cam*.05%W,cwy=0;
      g.fillStyle='#0e0c12';g.fillRect(cwx,0,W/8,FLOOR);
      // Battlements
      for(var bi=0;bi<5;bi++)fRR(cwx+bi*18,0,14,30,2,'#151220');
      // Windows
      fRR(cwx+20,80,30,50,3,'rgba(255,140,0,.15)');
      sRR(cwx+20,80,30,50,3,'#3a2a10',1);
      // Torch flicker
      g.globalAlpha=.4+.3*Math.sin(tick*.2+ci);
      fC(cwx+35,120,8,'#ff8800');g.globalAlpha=1;
    }
  }

  // Mountains parallax
  g.fillStyle=sc.sunny?'rgba(180,200,160,.4)':'#060206';
  g.beginPath();g.moveTo(0,FLOOR-20);
  for(var x=0;x<=W;x+=10)g.lineTo(x,FLOOR-20-Math.abs(Math.sin((x+cam*.07)*.006)*80+Math.sin((x+cam*.04)*.014)*40));
  g.lineTo(W,H);g.lineTo(0,H);g.closePath();g.fill();

  // Dead trees (not sunny stages)
  if(!sc.sunny){
    for(var ti=0;ti<12;ti++){
      var tbx=(ti*(WORLD/12)-cam*.3)%W;if(tbx<-100)tbx+=W+100;
      g.save();g.translate(tbx,FLOOR);g.strokeStyle='#150a04';g.lineCap='round';
      g.lineWidth=4;g.beginPath();g.moveTo(0,0);g.lineTo(0,-60);g.stroke();
      g.lineWidth=2;[[-20,-48,14],[-14,-36,-18],[16,-50,10]].forEach(function(b){g.beginPath();g.moveTo(0,b[1]);g.lineTo(b[0],b[1]+b[2]*.4);g.stroke();});
      g.restore();
    }
  }

  // Lightning bolts
  bolts.forEach(function(b,i){
    b.life--;
    g.save();g.shadowColor='#aaaaff';g.shadowBlur=16;
    g.strokeStyle='rgba(200,200,255,'+Math.min(1,b.life/3)+')';g.lineWidth=2;
    g.beginPath();g.moveTo(b.x,0);
    var cy=0,cx=b.x;
    while(cy<FLOOR){cy+=30+Math.random()*30;cx+=Math.random()*80-40;g.lineTo(cx,cy);}
    g.stroke();g.restore();
    if(b.life<=0)bolts.splice(i,1);
  });
  boltTimer--;
  if(boltTimer<=0){
    boltTimer=ri(sc.sunny?300:60,sc.sunny?600:180);
    bolts.push({x:Math.random()*W,life:6});
    SFX.thunder();
    g.fillStyle='rgba(200,200,255,.14)';g.fillRect(0,0,W,H);
  }

  // Volcano stage — lava glow
  if(stage===4){g.fillStyle='rgba(255,60,0,.08)';g.fillRect(0,FLOOR-100,W,100);}

  // Fog
  if(!sc.sunny){
    var fog=g.createLinearGradient(0,FLOOR-80,0,FLOOR+10);
    fog.addColorStop(0,'rgba(5,2,15,0)');fog.addColorStop(.5,'rgba(5,2,15,.35)');fog.addColorStop(1,'rgba(5,2,15,.7)');
    g.fillStyle=fog;g.fillRect(0,FLOOR-80,W,150);
  }
}

function drawWorld(){

    fRR(vsx-5,v.y-14,10,18,3,'rgba(180,0,0,.85)');sRR(vsx-5,v.y-14,10,18,3,'#880000',1.5);

// ── COMBO + SCORE POPUP ──────────────────────────────────────
function addKill(pts, wx, wy){
  P_comboTimer=150;          // 2.5 s window
  P_combo++;
  var mult=Math.min(P_combo,8);
  var earned=pts*mult;
  P.score+=earned;
  P.specialMeter=Math.min(100,P.specialMeter+6);
  // Floating popup
  var col=mult>=5?'#ff4400':mult>=3?'#ffaa00':'#ffff88';
  var sz =mult>=5?18:mult>=3?15:12;
  var txt=mult>=2?'+'+earned+' ×'+mult:'+'+earned;
  _scorePopups.push({wx:wx,wy:wy,vy:-1.8,val:txt,col:col,sz:sz,life:0,max:55});
  // Combo streak banner (2+)
  if(mult>=2) showMsg(mult+'\xd7 COMBO!',60);
  if(mult===8) showMsg('\ud83d\udd25 MAX COMBO ×8!',90);
}
function addBossScore(pts, wx, wy){
  // Boss kill: always big number, no combo multiplier applied (already huge)
  P.score+=pts;
  _scorePopups.push({wx:wx,wy:wy,vy:-2.2,val:'+'+pts,col:'#ff2222',sz:22,life:0,max:75});
}
function drawScorePopups(){
  for(var pi4=_scorePopups.length-1;pi4>=0;pi4--){
    var sp=_scorePopups[pi4];
    sp.life++;sp.wy+=sp.vy;sp.vy*=0.93;// decelerate
    if(sp.life>sp.max){_scorePopups.splice(pi4,1);continue;}
    var al=sp.life<8?sp.life/8:Math.max(0,1-(sp.life-sp.max*.5)/(sp.max*.5));
    g.globalAlpha=al;
    g.font='bold '+sp.sz+'px monospace';
    g.textAlign='center';
    // Shadow
    g.fillStyle='rgba(0,0,0,.7)';
    g.fillText(sp.val,scx(sp.wx)+1,sp.wy+1);
    g.fillStyle=sp.col;
    g.fillText(sp.val,scx(sp.wx),sp.wy);
    g.globalAlpha=1;
  }
}

function drawPlayer(){
  if(P.dead)return;
  if(P.invTimer>0&&Math.floor(tick/4)%2===0)return;
  var px=scx(P.x),py=P.y;
  // Shadow
  g.save();g.globalAlpha=.2;fRR(px+2,FLOOR-2,P.w-4,5,3,'#000');g.globalAlpha=1;g.restore();

  var lc=LIMB_COLS[selectedChar]||LIMB_COLS[0];
  var inAir=!P.onGround,rising=P.vy<-3;
  var spd=Math.abs(P.vx);
  var sw=Math.sin(P_walkCycle);

  // Body bob (2x per stride, scales with speed)
  var bodyBob=P.onGround?Math.sin(P_walkCycle*2)*Math.min(spd,6)*0.22:0;

  // Forward lean when running
  var lean=-P.vx*0.026;

  // Idle breathing when still
  var breathe=(spd<0.4&&P.onGround)?Math.sin(tick*0.055)*0.55:0;

  // Landing squash/stretch
  var sqX=1,sqY=1;
  if(P_landTimer>0){
    var lp=P_landTimer/9;
    sqX=1+lp*0.20;sqY=1-lp*0.16;
    P_landTimer--;
  }

  // ── Limb angles ──
  var hipL,hipR,kneeL,kneeR,shlL,shlR,elbL,elbR;
  if(inAir){
    if(rising){
      // Tuck: knees pulled up, arms thrown upward
      hipL=-0.52;hipR=0.52;
      kneeL=-0.95;kneeR=-0.95;
      shlL=-0.82;shlR=0.82;
      elbL=-0.55;elbR=-0.55;
    } else {
      // Falling: legs extend to land, arms out for balance
      hipL=0.32;hipR=-0.32;
      kneeL=-0.18;kneeR=-0.18;
      shlL=-0.28;shlR=0.28;
      elbL=-0.22;elbR=-0.22;
    }
  } else {
    // Walk cycle
    hipL= sw*0.50; hipR=-sw*0.50;
    // Knee: always slightly bent; bends more the further the thigh swings

  fRR(-6,10,13,6,4,lc.shoe);          // foot
  g.restore();
  g.restore();

  g.translate(lc.rHip,31);
  g.rotate(hipR);

  g.translate(0,12);

  fRR(-6,10,13,6,4,lc.shoe);
  g.restore();
  g.restore();

  g.save();
  g.translate(lc.lSho,15);            // shoulder
  g.rotate(shlL);
  fRR(-4,0,9,11,4,lc.arm);           // upper arm
  g.save();
  g.translate(0,10);                  // elbow joint
  g.rotate(elbL);
  fRR(-4,0,9,11,4,lc.arm);           // forearm

  g.translate(lc.rSho,15);
  g.rotate(shlR);
  fRR(-4,0,9,11,4,lc.arm);
  g.save();
  g.translate(0,10);

  fRR(-4,0,9,11,4,lc.arm);

  g.restore();

  g.restore();// end main transform
}

    if(P.invTimer<=0&&Math.abs(P.x+P.w/2-(boss.x+boss.w/2))<boss.w/2+14&&Math.abs(P.y+P.h/2-(boss.y+boss.h/2))<boss.h/2+20&&!(P.vy>0&&P.y+P.h<boss.y+boss.h*.28)){P.invTimer=130;P.vy=-6;P.vx=P.x<boss.x?-5:5;SFX.hurt();P.lives--;burst(P.x+P.w/2,P.y,'#660000',4);if(P.lives<=0){P.dead=true;P.deathVy=-10;}}
    if(boss.dead&&boss.deathTimer<200)boss.deathTimer++;
  }

  // Particles
  for(var pi3=particles.length-1;pi3>=0;pi3--){var p2=particles[pi3];p2.x+=p2.vx;p2.y+=p2.vy;p2.vy+=.2;p2.life++;if(p2.life>=p2.max)particles.splice(pi3,1);}
}

function fireWeapon(){
  if(P.blastCd>0)return;
  SFX.blast();
  if(!P.weapon||P.weaponAmmo<=0){
    // Default spirit blast — lower angle, continuous bounce
    P.blasts.push({x:P.x+P.w/2,y:P.y+P.h*.65,vx:P.dir*10,vy:0.4,alive:true,bounces:0,rot:0,traveled:0,dmg:1,col:'#4488ff',pierce:false,explode:false});
    P.blastCd=16;
  }else{
    var wd=WEAPONS[P.weapon];
    if(wd.melee){
      // Melee swing — instant arc damage
      var range=wd.range||70;
      enemies.forEach(function(e){if(!e.alive)return;var dx=e.x+e.w/2-(P.x+P.w/2);if(Math.abs(dx)<range&&Math.abs(e.y-P.y)<50&&(P.dir>0?dx>-20:dx<20)){e.hp-=wd.dmg;burst(e.x+e.w/2,e.y,'#cc0000',6);if(e.hp<=0){e.alive=false;addKill(e.pts,e.x+e.w/2,e.y);}}});
      if(boss.active&&boss.alive&&!boss.dead){var dx2=boss.x+boss.w/2-(P.x+P.w/2);if(Math.abs(dx2)<(wd.range+40)&&Math.abs(boss.y-P.y)<60){boss.hp-=wd.dmg;boss.hitTimer=20;burst(boss.x+boss.w/2,boss.y,'#cc0000',8);if(boss.hp<=0)killBoss();}}
      burst(P.x+P.w/2+(P.dir*40),P.y+P.h/2,'#ffcc00',4);
      P.weaponAmmo--;
    }else{
      // Projectile weapon
      for(var si2=0;si2<wd.multi;si2++){
        var spread=(si2-(wd.multi-1)/2)*wd.spread;
        P.blasts.push({x:P.x+P.w/2,y:P.y+P.h*.65,vx:P.dir*wd.vx,vy:wd.vy+spread,alive:true,bounces:0,rot:0,traveled:0,dmg:wd.dmg,col:wd.col,pierce:!!wd.pierce,explode:!!wd.explode});
      }
      P.weaponAmmo--;
    }
    if(P.weaponAmmo<=0){P.weapon=null;showMsg('Out of ammo!',90);}
    P.blastCd=P.weapon!=null?WEAPONS[P.weapon].cd:16;
  }
}

function updateWeapons(){

  for(var wi2=weapons.length-1;wi2>=0;wi2--){
    var wp=weapons[wi2];if(!wp.alive)continue;
    wp.bob+=.1;
    var magnet=P.powerupType==='magnet';
    if(magnet){var dx3=P.x+P.w/2-wp.x,dy3=P.y-wp.y;var dd=Math.sqrt(dx3*dx3+dy3*dy3);if(dd<200){wp.x+=dx3/dd*4;wp.y+=dy3/dd*4;}}
    if(Math.abs(wp.x-P.x-P.w/2)<28&&Math.abs(wp.y-P.y-P.h/2)<32){
      var wd2=WEAPONS[wp.type];
      P.weapon=wp.type;P.weaponAmmo=wd2.ammo;
      weapons.splice(wi2,1);SFX.soul();
      showMsg(wd2.e+' '+wd2.name+' x'+wd2.ammo+'!',120);
    }
  }
  // Power-up pickups
  for(var pi3=powerups.length-1;pi3>=0;pi3--){

    pp.bob+=.08;
    if(Math.abs(pp.x-P.x-P.w/2)<28&&Math.abs(pp.y-P.y-P.h/2)<32){
      var pd2=POWERUPS[pp.type];
      powerups.splice(pi3,1);SFX.oneup();

  if(P.powerupTimer>0){P.powerupTimer--;if(P.powerupTimer<=0){P.powerupType=null;}}

  // Invincible = full invincibility
  if(P.powerupType==='invic')P.invTimer=Math.max(P.invTimer,2);

function drawSpecialEffects(){
  if(P.specialActive===2&&P.specialTimer>0){// Mya heart bomb
    var ht=90-P.specialTimer;
    var exploding=P.specialTimer<=30;
    var hx=W/2,hy=H/2;

    if(!exploding){
      // Growing heart
      var scale2=ht/60;
      var hs=Math.max(1,scale2*Math.min(W,H)*0.55);
      g.globalAlpha=0.88;
      g.fillStyle='#ff2266';
      g.save();g.translate(hx,hy);g.scale(hs/100,hs/100);
      g.beginPath();g.moveTo(0,-30);
      g.bezierCurveTo(50,-80,100,-20,0,40);
      g.bezierCurveTo(-100,-20,-50,-80,0,-30);
      g.closePath();g.fill();
      // Inner sheen
      g.fillStyle='rgba(255,150,200,.35)';
      g.save();g.scale(0.65,0.65);g.translate(-8,-8);
      g.beginPath();g.moveTo(0,-30);g.bezierCurveTo(50,-80,100,-20,0,40);g.bezierCurveTo(-100,-20,-50,-80,0,-30);g.closePath();g.fill();
      g.restore();
      g.restore();
      g.globalAlpha=1;
    } else {
      // Explosion phase: white flash + expanding ring
      var prog=(30-P.specialTimer)/30;   // 0→1
      // Blinding white flash at the moment of detonation
      if(P.specialTimer>=25){
        g.globalAlpha=(30-P.specialTimer)/5;
        g.fillStyle='#ffffff';g.fillRect(0,0,W,H);
        g.globalAlpha=1;
      }
      // Pink afterglow wash
      g.globalAlpha=Math.max(0,.7-prog*.8);
      g.fillStyle='#ff2266';g.fillRect(0,0,W,H);
      g.globalAlpha=1;
      // Shockwave ring
      var ringR=prog*Math.max(W,H)*0.85;
      g.globalAlpha=Math.max(0,1-prog)*0.9;
      g.strokeStyle='#ffbbdd';g.lineWidth=8-prog*6;
      g.beginPath();g.arc(hx,hy,ringR,0,6.28);g.stroke();
      g.strokeStyle='#ffffff';g.lineWidth=3-prog*2;
      g.beginPath();g.arc(hx,hy,ringR*0.85,0,6.28);g.stroke();
      g.globalAlpha=1;
      // Heart fragments — 8 mini hearts shooting outward
      var fCount=8;
      for(var fi=0;fi<fCount;fi++){
        var fa=fi/fCount*Math.PI*2;
        var fd=prog*Math.min(W,H)*0.55;
        var fx=hx+Math.cos(fa)*fd,fy=hy+Math.sin(fa)*fd;
        var fs=(1-prog)*18;
        if(fs<2)continue;
        g.globalAlpha=Math.max(0,1-prog)*0.85;
        g.fillStyle='#ff44aa';
        g.save();g.translate(fx,fy);g.scale(fs/100,fs/100);
        g.beginPath();g.moveTo(0,-30);g.bezierCurveTo(50,-80,100,-20,0,40);g.bezierCurveTo(-100,-20,-50,-80,0,-30);g.closePath();g.fill();
        g.restore();
        g.globalAlpha=1;
      }
    }
  }
  if(P.specialActive===5&&P.specialTimer>0){// Superman heat vision trail
    g.globalAlpha=.18;g.fillStyle='#ff2200';g.fillRect(0,P.y+P.h/2-6,W,12);g.globalAlpha=1;
  }
  if(P.specialActive===8&&P.specialTimer>0){// Cora lasso ring
    var lx=scx(P.x+P.w/2),ly=P.y+P.h/2;
    var prog=(180-P.specialTimer)/180;
    g.globalAlpha=.6-prog*.4;
    g.strokeStyle='#ffdd44';g.lineWidth=4;
    g.beginPath();g.arc(lx,ly,90,0,6.28);g.stroke();
    g.globalAlpha=1;
  }
  if(P.specialActive===4&&P.specialTimer>0){// Wolverine claw flash
    var cx4=scx(P.x+P.w/2),cy4=P.y+P.h/2;
    g.globalAlpha=.12;g.fillStyle='#ffcc00';g.beginPath();g.arc(cx4,cy4,60,0,6.28);g.fill();g.globalAlpha=1;
  }
}

function drawObstacles(){
  for(var oi=0;oi<obstacles.length;oi++){
    var ob=obstacles[oi];
    var ox2=scx(ob.x);
    if(ox2<-60||ox2>W+60)continue;
    var oy2=ob.y, ow=ob.w, oh=ob.h;
    // Glow outline so obstacles read clearly against everything else
    g.shadowColor='#ff8800';g.shadowBlur=12;
    g.strokeStyle='rgba(255,180,60,.9)';g.lineWidth=2;
    g.beginPath();g.roundRect(ox2-1,oy2-1,ow+2,oh+2,3);g.stroke();
    g.shadowBlur=0;
    if(ob.t==='wall'){
      // Stone wall — brick pattern
      fRR(ox2,oy2,ow,oh,2,ob.col);
      g.strokeStyle=ob.col2;g.lineWidth=1;
      var bh2=12,bw2=ow/2;
      for(var br=0;br*bh2<oh;br++){
        var off=br%2===0?0:bw2/2;
        g.beginPath();g.moveTo(ox2,oy2+br*bh2);g.lineTo(ox2+ow,oy2+br*bh2);g.stroke();
        g.beginPath();g.moveTo(ox2+off,oy2+br*bh2);g.lineTo(ox2+off,oy2+Math.min((br+1)*bh2,oh));g.stroke();
        g.beginPath();g.moveTo(ox2+off+bw2,oy2+br*bh2);g.lineTo(ox2+off+bw2,oy2+Math.min((br+1)*bh2,oh));g.stroke();
      }
      // Top edge highlight
      g.fillStyle='rgba(255,255,255,.08)';g.fillRect(ox2,oy2,ow,4);
    } else if(ob.t==='crate'){
      fRR(ox2,oy2,ow,oh,3,ob.col);
      g.strokeStyle=ob.col2;g.lineWidth=1.5;
      g.strokeRect(ox2+3,oy2+3,ow-6,oh-6);
      g.beginPath();g.moveTo(ox2,oy2);g.lineTo(ox2+ow,oy2+oh);g.stroke();
      g.beginPath();g.moveTo(ox2+ow,oy2);g.lineTo(ox2,oy2+oh);g.stroke();
      g.fillStyle='rgba(255,220,140,.1)';g.fillRect(ox2,oy2,ow,6);
    } else if(ob.t==='fence'){
      // Vertical post + crossbars
      fRR(ox2,oy2,ow,oh,2,ob.col);
      fRR(ox2-4,oy2,ow+8,6,2,ob.col2);
      fRR(ox2-4,oy2+oh*.4,ow+8,6,2,ob.col2);
      fRR(ox2-4,oy2+oh*.72,ow+8,6,2,ob.col2);
      g.fillStyle='rgba(255,255,255,.06)';g.fillRect(ox2,oy2,4,oh);
    } else if(ob.t==='barrel'){
      // Rounded barrel
      g.fillStyle=ob.col;g.beginPath();g.ellipse(ox2+ow/2,oy2+oh/2,ow/2,oh/2,0,0,6.28);g.fill();
      g.strokeStyle=ob.col2;g.lineWidth=3;
      [.25,.5,.75].forEach(function(p){
        g.beginPath();g.ellipse(ox2+ow/2,oy2+oh*p,ow/2*.9,3,0,0,6.28);g.stroke();
      });
      g.fillStyle='rgba(255,255,255,.12)';
      g.beginPath();g.ellipse(ox2+ow*.35,oy2+oh*.3,ow*.12,oh*.12,-.3,0,6.28);g.fill();
    } else { // slab
      fRR(ox2,oy2,ow,oh,3,ob.col);
      fRR(ox2,oy2,ow,6,2,'rgba(255,255,255,.1)');
      fRR(ox2,oy2+oh-4,ow,4,2,ob.col2);
      g.strokeStyle=ob.col2;g.lineWidth=1;
      for(var sl=1;sl<3;sl++){g.beginPath();g.moveTo(ox2+sl*(ow/3),oy2+6);g.lineTo(ox2+sl*(ow/3),oy2+oh-4);g.stroke();}
    }
  }
}

var _resumeAfterCharSelect=false; // true when coming from pause screen
function drawOver(){
  g.fillStyle='rgba(0,0,0,.9)';g.fillRect(0,0,W,H);
  lbl('YOU DIED',W/2,H/2-48,'#880000',52);
  lbl('Score: '+P.score,W/2,H/2+10,'#aa5555',16);
  lbl(isTouch?'Tap START to continue':'Press ENTER to continue',W/2,H/2+52,'#662222',13);
}
function drawWin(){
  g.fillStyle='rgba(0,0,0,.92)';g.fillRect(0,0,W,H);
  lbl('VICTORY!',W/2,H/2-52,'#cc2222',42);
  lbl('All 10 stages cleared!',W/2,H/2-4,'#886666',15);
  lbl('Score: '+P.score+'  Coins: '+coins,W/2,H/2+34,'#664444',13);
  lbl(isTouch?'Tap START to continue':'Press ENTER to continue',W/2,H/2+70,'#662222',13);
}

var _msg='',_msgT=0;
function showMsg(t,d){_msg=t;_msgT=d||120;}
function drawMsg(){
  if(_msgT>0){_msgT--;var al=Math.min(1,_msgT/20);
    g.globalAlpha=al;fRR(W/2-130,H*.42-18,260,32,8,'rgba(0,0,0,.82)');
    lbl(_msg,W/2,H*.42,'#ffd700',13);g.globalAlpha=1;}
}
function drawStageTitle(){
  if(tick<180){
    var al=tick<60?tick/60:tick>120?(180-tick)/60:1;
    g.globalAlpha=al;g.fillStyle='rgba(0,0,0,.7)';g.fillRect(W/2-200,H/2-40,400,80);
    lbl('STAGE '+(stage+1),W/2,H/2-10,'#aa2222',28);
    lbl(STAGES[stage].name,W/2,H/2+24,'#888888',16);
    g.globalAlpha=1;
  }
}

// ── RESTART / NEXT STAGE ─────────────────────────────────────
function nextStage(){
  cam=0;tick=0;particles=[];bolts=[];boltTimer=80;groanTimer=250;_msg='';_msgT=0;obstacles=[];
  P.x=100;P.y=FLOOR-60;P.vx=0;P.vy=0;P.onGround=false;P.dir=1;
  P.invTimer=60;P.blastCd=0;P.dead=false;P.blasts=[];P.weapon=null;P.weaponAmmo=0;P.powerupTimer=0;P.powerupType=null;P.specialMeter=0;P.specialActive=0;P.specialTimer=0;
  genStage(stage);
}
function restart(){
  stopCharTheme();stage=0;state='play';coins=0;coinProgress=0;
  P.lives=5;P.score=0;P.weapon=null;P.weaponAmmo=0;P.weaponTimer=0;P.powerupTimer=0;P.powerupType=null;
  nextStage();
}

// ── INPUT ────────────────────────────────────────────────────
document.addEventListener('keydown',function(e){
  // ── Initials entry ───────────────────────────────────
  if(state==='initials'){
    if(e.code==='ArrowUp'  ||e.code==='KeyW'){hsCycleLetter(1);return;}
    if(e.code==='ArrowDown'||e.code==='KeyS'){hsCycleLetter(-1);return;}
    if(e.code==='ArrowLeft'||e.code==='KeyA'){_hsEntry.cursor=(_hsEntry.cursor+2)%3;return;}
    if(e.code==='ArrowRight'||e.code==='KeyD'){_hsEntry.cursor=(_hsEntry.cursor+1)%3;return;}
    if(e.code==='Enter'||e.code==='Space'){hsConfirmInitials();return;}
    // Direct letter press
    if(e.key&&e.key.length===1&&e.key.match(/[a-zA-Z]/)){
      _hsEntry.letters[_hsEntry.cursor]=e.key.toUpperCase();
      _hsEntry.cursor=Math.min(2,_hsEntry.cursor+1);return;}
  }
  // ── Leaderboard ──────────────────────────────────────
  if(state==='leaderboard'&&(e.code==='Escape'||e.code==='KeyL')){state='select';return;}
  if(state==='select'&&e.code==='KeyL'){state='leaderboard';return;}

  keys[e.code]=true;startMusic();
  if(state!=='play'){return;}  // keyboard does nothing on death/win screens
  if(P.dead)return;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&P.onGround){P.vy=-13.5;P.onGround=false;SFX.jump();}
  if(e.code==='ArrowDown'||e.code==='KeyS'){if(P.onGround)P.dropping=12;}
    if((e.code==='KeyZ'||e.code==='KeyF')&&P.blastCd<=0){
      fireWeapon();
    }
});
document.addEventListener('keyup',function(e){delete keys[e.code];});
function _audioUnlock(){startMusic();}
document.addEventListener('click',_audioUnlock,{once:true});
document.addEventListener('touchstart',_audioUnlock,{once:true,passive:true});

// ── TOUCH ────────────────────────────────────────────────────
if(isTouch){
  document.getElementById('touch-ui').style.display='block';
  document.getElementById('ui').style.display='none';
  var BK={'b-left':'ArrowLeft','b-right':'ArrowRight','b-jump':'Space','b-blast':'KeyZ','b-up':'ArrowUp','b-down':'ArrowDown'};
  Object.keys(BK).forEach(function(id){
    var el=document.getElementById(id);if(!el)return;var code=BK[id];
    el.addEventListener('touchstart',function(e){e.preventDefault();startMusic();
      if((code==='Space'||code==='ArrowUp')&&P.onGround){
        P.vy=-15.5;P.onGround=false;SFX.jump();
        P_doFlip=true;P_flipSpeed=P.dir*22;P_flipAngle=0;
      }
      if(code==='ArrowDown'&&P.onGround)P.dropping=12;
      if(code==='KeyZ'&&P.blastCd<=0){fireWeapon();}
      keys[code]=true;el.classList.add('pressed');},{passive:false});
    el.addEventListener('touchend',function(e){e.preventDefault();delete keys[code];el.classList.remove('pressed');},{passive:false});
    el.addEventListener('touchcancel',function(e){e.preventDefault();delete keys[code];el.classList.remove('pressed');},{passive:false});
  });
  // ── Swipe-up gesture on entire dpad zone ──────────
  (function(){
    var dpad=document.getElementById('dpad');
    if(!dpad)return;
    var sx=0,sy=0,st=0;
    dpad.addEventListener('touchstart',function(e){
      var t=e.touches[0];sx=t.clientX;sy=t.clientY;st=Date.now();
    },{passive:true});
    dpad.addEventListener('touchend',function(e){
      var t=e.changedTouches[0];
      var dx=t.clientX-sx, dy=t.clientY-sy, dt=Date.now()-st;
      // Fast upward swipe: dy < -22px within 320ms
      if(dy<-22&&dt<320&&Math.abs(dy)>Math.abs(dx)*0.5){
        if(state==='play'&&!P.dead&&P.onGround){
          P.vy=-15.5;P.onGround=false;SFX.jump();
          if(dx>14)       {P_doFlip=true;P_flipSpeed=22; P_flipAngle=0;}
          else if(dx<-14) {P_doFlip=true;P_flipSpeed=-22;P_flipAngle=0;}
        }
      }
    },{passive:true});
  })();
  // ── 8-way: diagonal buttons ─────────────────────
  var DIAG={'d-ul':['ArrowUp','ArrowLeft'],'d-ur':['ArrowUp','ArrowRight'],
            'd-dl':['ArrowDown','ArrowLeft'],'d-dr':['ArrowDown','ArrowRight']};
  Object.keys(DIAG).forEach(function(id){
    var el=document.getElementById(id);if(!el)return;
    var codes=DIAG[id];
    function dn(e){e.preventDefault();startMusic();
      codes.forEach(function(c){keys[c]=true;});
      if(codes.indexOf('ArrowUp')>=0&&P.onGround){
        P.vy=-15.5;P.onGround=false;SFX.jump();
        var fdir=codes.indexOf('ArrowRight')>=0?1:-1;
        P_doFlip=true;P_flipSpeed=fdir*22;P_flipAngle=0;
      }
      el.classList.add('pressed');}
    function up(e){e.preventDefault();codes.forEach(function(c){delete keys[c];});el.classList.remove('pressed');}
    el.addEventListener('touchstart',dn,{passive:false});
    el.addEventListener('touchend',up,{passive:false});
    el.addEventListener('touchcancel',up,{passive:false});
  });
  // Centre START button — restarts on death/win, does nothing mid-game
  var bspec=document.getElementById('b-special');
  if(bspec){
    bspec.addEventListener('touchstart',function(e){e.preventDefault();fireSpecial();},{passive:false});
    bspec.addEventListener('click',function(){fireSpecial();});
  }
  var bst=document.getElementById('b-start');
  if(bst){
    bst.addEventListener('touchstart',function(e){e.preventDefault();startMusic();
      if(state==='select'){startMusic();if(_resumeAfterCharSelect){_resumeAfterCharSelect=false;state='play';}else{state='play';restart();}}
      else if(state==='play'){state='paused';}
      else if(state==='paused'){state='play';}
      else if(state==='over'||state==='win'){state='select';}
    },{passive:false});
    bst.addEventListener('click',function(){startMusic();
      if(state==='select'){startMusic();if(_resumeAfterCharSelect){_resumeAfterCharSelect=false;state='play';}else{state='play';restart();}}
      else if(state==='play'){state='paused';}
      else if(state==='paused'){state='play';}
      else if(state==='over'||state==='win'){state='select';}
    });
  }
  document.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
}

// ── MAIN LOOP ────────────────────────────────────────────────
// Mouse tracking for canvas restart button hover + click
var _lastHoverChar=-99;
cv.addEventListener('mousemove',function(e){
  var p=_cvCoords(e.clientX,e.clientY);_mx=p.x;_my=p.y;
  // Hover on char select cards
  if(state==='select'&&drawCharSelect._cards){
    var pm=_cvCoords(e.clientX,e.clientY);
    _mx=pm.x;_my=pm.y;
    _selHover=-1;
    drawCharSelect._cards.forEach(function(c){
      if(_mx>c.x&&_mx<c.x+c.w&&_my>c.y&&_my<c.y+c.h)_selHover=c.i;
    });
    // Start character theme on hover change
    if(_selHover!==_lastHoverChar){
      _lastHoverChar=_selHover;
      if(_selHover>=0){SFX.menuSel();playCharTheme(_selHover);}
      else stopCharTheme();
    }
  }
});
function handleSelectClick(cx,cy){
  if(state!=='select')return;
  if(drawCharSelect._cards){
    drawCharSelect._cards.forEach(function(c){
      if(cx>c.x&&cx<c.x+c.w&&cy>c.y&&cy<c.y+c.h)selectedChar=c.i;
    });
  }
  var b=drawCharSelect;
  if(b._bx&&cx>b._bx&&cx<b._bx+b._bw&&cy>b._by&&cy<b._by+b._bh){
    startMusic();
    if(_resumeAfterCharSelect){
      // Just swap the skin and go back — no restart
      _resumeAfterCharSelect=false;
      state='play';
    } else {
      state='play';restart();
    }
  }
}
cv.addEventListener('click',function(e){
  var p=_cvCoords(e.clientX,e.clientY);var cx=p.x,cy=p.y;
  if(state==='select'){handleSelectClick(cx,cy);return;}
  if(state==='paused'){
    var dp=drawPause;
    if(dp&&dp._prx&&cx>dp._prx&&cx<dp._prx+dp._prw&&cy>dp._pry&&cy<dp._pry+dp._prh){state='play';return;}
    if(dp&&dp._ccx&&cx>dp._ccx&&cx<dp._ccx+dp._ccw&&cy>dp._ccy&&cy<dp._ccy+dp._cch){
      _resumeAfterCharSelect=true;state='select';return;
    }
  }
  if(state==='over'||state==='win'){
    state='select';return;
  }
});
function _cvCoords(clientX,clientY){
  // Scale raw client coords to canvas logical pixels — fixes landscape mismatch
  var r=cv.getBoundingClientRect();
  return {
    x:(clientX-r.left)*(cv.width/r.width),
    y:(clientY-r.top)*(cv.height/r.height)
  };
}
cv.addEventListener('touchend',function(e){
  var t=e.changedTouches[0];
  var p=_cvCoords(t.clientX,t.clientY);var cx=p.x,cy=p.y;
  if(state==='initials'){e.preventDefault();
    var di=drawInitials;
    if(di._cbx&&cx>di._cbx&&cx<di._cbx+di._cbw&&cy>di._cby&&cy<di._cby+di._cbh){hsConfirmInitials();return;}
    if(di._arrowUp)di._arrowUp.forEach(function(a){if(cx>a.x&&cx<a.x+a.w&&cy>a.y&&cy<a.y+a.h){_hsEntry.cursor=a.i;hsCycleLetter(1);}});
    if(di._arrowDn)di._arrowDn.forEach(function(a){if(cx>a.x&&cx<a.x+a.w&&cy>a.y&&cy<a.y+a.h){_hsEntry.cursor=a.i;hsCycleLetter(-1);}});
    if(di._boxes) di._boxes.forEach( function(a){if(cx>a.x&&cx<a.x+a.w&&cy>a.y&&cy<a.y+a.h){_hsEntry.cursor=a.i;}});
    return;}
  if(state==='leaderboard'){e.preventDefault();
    var dl=drawLeaderboard;
    if(dl._bbx&&cx>dl._bbx&&cx<dl._bbx+dl._bbw&&cy>dl._bby&&cy<dl._bby+dl._bbh){state='select';}
    return;}
  if(state==='select'&&!_dragging){
    var dcs2=drawCharSelect;
    if(dcs2._ltx&&cx>dcs2._ltx&&cx<dcs2._ltx+dcs2._ltw&&cy>dcs2._lty&&cy<dcs2._lty+dcs2._lth){e.preventDefault();state='leaderboard';return;}
  }
  if(state==='select'){e.preventDefault();
    if(drawCharSelect._cards)drawCharSelect._cards.forEach(function(c){
      if(cx>c.x&&cx<c.x+c.w&&cy>c.y&&cy<c.y+c.h){
        if(c.i!==_lastHoverChar){_lastHoverChar=c.i;SFX.menuSel();playCharTheme(c.i);}
      }
    });
    handleSelectClick(cx,cy);return;}
  if(state==='paused'){
    var dp2=drawPause;
    if(dp2&&dp2._prx&&cx>dp2._prx&&cx<dp2._prx+dp2._prw&&cy>dp2._pry&&cy<dp2._pry+dp2._prh){e.preventDefault();state='play';return;}
    if(dp2&&dp2._ccx&&cx>dp2._ccx&&cx<dp2._ccx+dp2._ccw&&cy>dp2._ccy&&cy<dp2._ccy+dp2._cch){
      e.preventDefault();_resumeAfterCharSelect=true;state='select';return;
    }
  }
  if(state==='over'||state==='win'){
    if(cx>_btnX&&cx<_btnX+_btnW&&cy>_btnY&&cy<_btnY+_btnH){e.preventDefault();startMusic();restart();}
  }
},{passive:false});
genStage(0);
function loop(){
  requestAnimationFrame(loop);
  if(state==='play'){update();updateWeapons();updateSpecial();}
  if(state==='initials'){drawInitials();return;}
  if(state==='leaderboard'){drawLeaderboard();return;}
  if(state==='select'){drawCharSelect();return;}
  drawBG();drawWorld();drawObstacles();drawWeapons();drawEnemies();drawBoss();drawBlasts();drawPlayer();drawParticles();drawSpecialEffects();drawHUD();drawSpecialMeter();drawMsg();
  if(state==='play')drawStageTitle();
  if(state==='paused'){
    g.fillStyle='rgba(0,0,0,.72)';g.fillRect(0,0,W,H);
    lbl('PAUSED',W/2,H/2-60,'#ffffff',36);
    // Resume button
    var prx=W/2-80,pry=H/2-20,prw=160,prh=44;
    var prh2=_mx>prx&&_mx<prx+prw&&_my>pry&&_my<pry+prh;
    g.fillStyle=prh2?'#cc1111':'#880000';
    g.beginPath();g.roundRect(prx,pry,prw,prh,10);g.fill();
    g.strokeStyle='#ff4444';g.lineWidth=2;g.beginPath();g.roundRect(prx,pry,prw,prh,10);g.stroke();
    lbl('\u25b6 RESUME',W/2,pry+29,'#fff',15);
    // Change character button
    var ccx=W/2-80,ccy=H/2+36,ccw=160,cch=38;
    var cch2=_mx>ccx&&_mx<ccx+ccw&&_my>ccy&&_my<ccy+cch;
    g.fillStyle=cch2?'#444':'#222';
    g.beginPath();g.roundRect(ccx,ccy,ccw,cch,10);g.fill();
    g.strokeStyle='#888';g.lineWidth=1.5;g.beginPath();g.roundRect(ccx,ccy,ccw,cch,10);g.stroke();
    lbl('\ud83c\udfae Change Character',W/2,ccy+25,'#ccc',12);
    // Store bounds
    drawPause._prx=prx;drawPause._pry=pry;drawPause._prw=prw;drawPause._prh=prh;
    drawPause._ccx=ccx;drawPause._ccy=ccy;drawPause._ccw=ccw;drawPause._cch=cch;
  }
  if(state==='over')drawOver();
  if(state==='win')drawWin();
}
loop();
</script></body></html>

  var rev=a.createConvolver();var len=a.sampleRate*4;var imp=a.createBuffer(2,len,a.sampleRate);

function update(){

    P.deathVy+=.5;P.y+=P.deathVy;

      P.x=cam+80;P.y=FLOOR-60;P.vy=0;P.vx=0;P.dead=false;P.invTimer=180;}
    return;
  }

  P.x+=P.vx;P.y+=P.vy;

  if(P.y>H+20){P.dead=true;P.deathVy=-8;SFX.hurt();}
  if(P.invTimer>0)P.invTimer--;if(P.blastCd>0)P.blastCd--;

  // Blasts (short range — max 250px travel)
  for(var bi=P.blasts.length-1;bi>=0;bi--){
    var b=P.blasts[bi];if(!b.alive){P.blasts.splice(bi,1);continue;}
    b.x+=b.vx;b.y+=b.vy;b.vy+=.3;b.rot+=.28;b.traveled+=Math.abs(b.vx);
    var maxBounce=P.weapon?WEAPONS[P.weapon].bounce:4;
    var maxTravel=P.weapon&&WEAPONS[P.weapon].pierce?W*6:1140;
    if(b.y>=FLOOR-4){b.vy=-(Math.abs(b.vy)*.78+2);b.bounces++;if(b.bounces>maxBounce||Math.abs(b.vy)<1.5)b.alive=false;}
    if(b.traveled>maxTravel||b.x<cam-800||b.x>cam+W+800)b.alive=false;
    for(var ei2=0;ei2<enemies.length;ei2++){var e=enemies[ei2];if(!e.alive||!b.alive)continue;if(Math.abs(b.x-e.x-e.w/2)<e.w/2+8&&Math.abs(b.y-e.y-e.h/2)<e.h/2+8){var bdmg=(b.dmg||1)*(P.powerupType==='dmg2x'?2:1);e.hp-=bdmg;if(!b.pierce)b.alive=false;SFX.stomp();burst(e.x+e.w/2,e.y,'#660000',5);if(b.explode){enemies.forEach(function(e3){if(!e3.alive||e3===e)return;if(Math.hypot(b.x-e3.x-e3.w/2,b.y-e3.y-e3.h/2)<60){e3.hp-=bdmg;burst(e3.x+e3.w/2,e3.y,'#ff4400',3);}});}if(e.hp<=0){e.alive=false;P.score+=e.pts;burst(e.x+e.w/2,e.y,'#440000',8);}}}
    if(b.alive&&boss.active&&boss.alive&&!boss.dead){if(Math.abs(b.x-(boss.x+boss.w/2))<boss.w/2+10&&Math.abs(b.y-(boss.y+boss.h/2))<boss.h/2+10){var bbd=(b.dmg||1)*(P.powerupType==='dmg2x'?2:1);boss.hp-=bbd;boss.hitTimer=18;if(!b.pierce)b.alive=false;SFX.hurt();burst(boss.x+boss.w/2,boss.y,'#4400aa',6);if(boss.hp<=0)killBoss();}}
  }

  // Coins
  for(var si=souls.length-1;si>=0;si--){var s=souls[si];if(!s.alive)continue;if(Math.abs(s.x-P.x-P.w/2)<22&&Math.abs(s.y-P.y-P.h/2)<28){s.alive=false;coins++;coinProgress++;P.score+=10;SFX.soul();if(coinProgress>=100){P.lives=Math.min(P.lives+1,8);coinProgress=0;SFX.oneup();}}}
  for(var vi=vials.length-1;vi>=0;vi--){var v=vials[vi];if(!v.alive)continue;if(Math.abs(v.x-P.x-P.w/2)<22&&Math.abs(v.y-P.y-P.h/2)<30){v.alive=false;P.lives=Math.min(P.lives+1,8);SFX.oneup();}}

  // Graves
  for(var gi=0;gi<graves.length;gi++){
    var gr=graves[gi];if(gr.state==='done')continue;

    if(gr.state==='shaking'){gr.shakeX=Math.floor(Math.random()*7-3);gr.timer--;burst(gr.x,FLOOR-10,'#2a1808',1);if(gr.timer<=0){gr.state='emerging';gr.emergeY=0;gr.shakeX=0;var zt2=gr.type;var zz={x:gr.x-zt2.sz/2,y:FLOOR-zt2.sz,vx:-zt2.spd,vy:0,w:zt2.sz,h:zt2.sz,dir:-1,alive:true,deathAnim:0,stunTimer:0,hp:zt2.hp,initHp:zt2.hp,col:zt2.col,eye:zt2.eye,spd:zt2.spd,pts:zt2.pts};gr.zombie=zz;enemies.push(zz);}}
    if(gr.state==='emerging'){gr.emergeY+=.025;if(gr.emergeY>=1){gr.emergeY=1;gr.state='done';}}
  }

  // Enemies
  for(var ei3=0;ei3<enemies.length;ei3++){
    var e2=enemies[ei3];if(!e2.alive)continue;if(Math.abs(e2.x-(cam+W/2))>W+80)continue;
    if(e2.stunTimer>0){e2.stunTimer--;continue;}
    e2.x+=e2.vx;e2.vy=Math.min(e2.vy+GR,14);e2.y+=e2.vy;
    var ep=landOn(e2.x,e2.y,e2.w,e2.h,e2.vy);if(ep){e2.y=ep.y-e2.h;e2.vy=0;}
    if(e2.y>H+50){e2.y=FLOOR-e2.h;e2.vy=0;}
    if(e2.x<cam-120||e2.x>cam+W+100){e2.vx*=-1;e2.dir*=-1;}
    if(e2.x<10){e2.vx=Math.abs(e2.vx);e2.dir=1;}
    if(P.invTimer>0)continue;
    var dx2=P.x+P.w/2-(e2.x+e2.w/2),dy2=P.y+P.h-(e2.y+e2.h*.5);
    if(Math.abs(dx2)<e2.w/2+12&&Math.abs(dy2)<e2.h/2+18){
      if(P.vy>0&&P.y+P.h<e2.y+e2.h*.42){e2.hp--;P.vy=-9;SFX.stomp();burst(e2.x+e2.w/2,e2.y,'#660000',5);if(e2.hp<=0){e2.alive=false;P.score+=e2.pts;burst(e2.x+e2.w/2,e2.y,'#880000',8);}else e2.stunTimer=55;}
      else{P.invTimer=130;P.vy=-6;P.vx=dx2>0?-4:4;SFX.hurt();P.lives--;burst(P.x+P.w/2,P.y,'#660000',4);if(P.lives<=0){P.dead=true;P.deathVy=-10;state='over';}}
    }
  }

  // Boss activation
  var BOSS_X=WORLD-750;
  if(P.x>BOSS_X-W*.8&&!boss.active&&boss.alive){boss.active=true;SFX.boss();burst(BOSS_X+boss.w/2,FLOOR-80,'#880000',12);}
  if(boss.active&&boss.alive&&!boss.dead){
    var en2=boss.hp<=boss.maxHp/2;boss.phase2=en2;
    boss.timer++;boss.x+=boss.vx*(en2?1.5:1);boss.vy=Math.min(boss.vy+GR,14);boss.y+=boss.vy;
    var bpp=landOn(boss.x,boss.y,boss.w,boss.h,boss.vy);if(bpp){boss.y=bpp.y-boss.h;boss.vy=0;}

    if(boss.x>BOSS_X+220){boss.vx=-Math.abs(boss.vx);boss.dir=-1;}
    if(boss.hitTimer>0)boss.hitTimer--;
    boss.swingCd--;boss.swingAngle*=.85;
    if(!boss.swinging&&boss.swingCd<=0&&Math.abs(P.x-(boss.x+boss.w/2))<300){boss.swinging=true;boss.swingDir=P.x<boss.x?-1:1;boss.swingTimer=22;boss.swingCd=80+(en2?-25:0);SFX.sword();}
    if(boss.swinging){boss.swingTimer--;boss.swingAngle+=boss.swingDir*.22*(en2?1.6:1);if(boss.swingTimer<=0){boss.swinging=false;boss.shockwaves.push({x:boss.x+boss.w/2,r:10,alpha:.9,speed:4});SFX.slam();}}
    // Sword tip
    var stx=boss.x+boss.w*.5+Math.sin(boss.swingAngle+.2)*88*boss.dir,sty=boss.y+boss.h*.3-Math.cos(boss.swingAngle+.2)*88;
    if(boss.swinging&&P.invTimer<=0&&Math.abs(stx-(P.x+P.w/2))<26&&Math.abs(sty-(P.y+P.h/2))<26){P.invTimer=140;P.vy=-7;P.vx=P.x<boss.x?-6:6;SFX.hurt();P.lives--;burst(P.x+P.w/2,P.y,'#880000',5);if(P.lives<=0){P.dead=true;P.deathVy=-10;}}
    boss.jumpCd--;if(boss.jumpCd<=0&&Math.abs(P.x-(boss.x+boss.w/2))<360){boss.vy=-(en2?15:12);boss.jumpCd=200+(en2?-70:0);SFX.boss();}
    boss.shootCd--;if(boss.shootCd<=0){var bd=P.x<boss.x?-1:1;boss.projs.push({x:boss.x+boss.w/2,y:boss.y+boss.h*.25,vx:bd*(en2?7:5),vy:-4,alive:true,rot:0});boss.shootCd=en2?50:85;}
    for(var pi2=boss.projs.length-1;pi2>=0;pi2--){var bp=boss.projs[pi2];bp.x+=bp.vx;bp.y+=bp.vy;bp.vy+=.35;if(bp.y>FLOOR){boss.projs.splice(pi2,1);continue;}if(P.invTimer<=0&&Math.abs(bp.x-(P.x+P.w/2))<20&&Math.abs(bp.y-(P.y+P.h/2))<20){boss.projs.splice(pi2,1);P.invTimer=110;P.vy=-5;P.vx=bp.vx>0?-4:4;SFX.hurt();P.lives--;burst(P.x+P.w/2,P.y,'#660000',4);if(P.lives<=0){P.dead=true;P.deathVy=-10;}}}

    // Stomp boss

function fireWeapon(){
  if(P.blastCd>0)return;
  SFX.blast();
  if(!P.weapon||P.weaponAmmo<=0){
    // Default spirit blast — lower angle, continuous bounce
    P.blasts.push({x:P.x+P.w/2,y:P.y+P.h*.65,vx:P.dir*10,vy:0.4,alive:true,bounces:0,rot:0,traveled:0,dmg:1,col:'#4488ff',pierce:false,explode:false});
    P.blastCd=16;
  }else{
    var wd=WEAPONS[P.weapon];
    if(wd.melee){
      // Melee swing — instant arc damage
      var range=wd.range||70;
      enemies.forEach(function(e){if(!e.alive)return;var dx=e.x+e.w/2-(P.x+P.w/2);if(Math.abs(dx)<range&&Math.abs(e.y-P.y)<50&&(P.dir>0?dx>-20:dx<20)){e.hp-=wd.dmg;burst(e.x+e.w/2,e.y,'#cc0000',6);if(e.hp<=0){e.alive=false;P.score+=e.pts;}}});
      if(boss.active&&boss.alive&&!boss.dead){var dx2=boss.x+boss.w/2-(P.x+P.w/2);if(Math.abs(dx2)<(wd.range+40)&&Math.abs(boss.y-P.y)<60){boss.hp-=wd.dmg;boss.hitTimer=20;burst(boss.x+boss.w/2,boss.y,'#cc0000',8);if(boss.hp<=0)killBoss();}}
      burst(P.x+P.w/2+(P.dir*40),P.y+P.h/2,'#ffcc00',4);
      P.weaponAmmo--;
    }else{
      // Projectile weapon
      for(var si2=0;si2<wd.multi;si2++){
        var spread=(si2-(wd.multi-1)/2)*wd.spread;
        P.blasts.push({x:P.x+P.w/2,y:P.y+P.h*.65,vx:P.dir*wd.vx,vy:wd.vy+spread,alive:true,bounces:0,rot:0,traveled:0,dmg:wd.dmg,col:wd.col,pierce:!!wd.pierce,explode:!!wd.explode});
      }
      P.weaponAmmo--;
    }
    if(P.weaponAmmo<=0){P.weapon=null;showMsg('Out of ammo!',90);}
    P.blastCd=P.weapon!=null?WEAPONS[P.weapon].cd:16;
  }
}

function updateWeapons(){

    var wp=weapons[wi2];if(!wp.alive)continue;

    var magnet=P.powerupType==='magnet';

    if(Math.abs(wp.x-P.x-P.w/2)<28&&Math.abs(wp.y-P.y-P.h/2)<32){
      var wd2=WEAPONS[wp.type];
      P.weapon=wp.type;P.weaponAmmo=wd2.ammo;
      weapons.splice(wi2,1);SFX.soul();
      showMsg(wd2.e+' '+wd2.name+' x'+wd2.ammo+'!',120);
    }
  }
  // Power-up pickups
  for(var pi3=powerups.length-1;pi3>=0;pi3--){
    var pp=powerups[pi3];if(!pp.alive)continue;
    pp.bob+=.08;
    if(Math.abs(pp.x-P.x-P.w/2)<28&&Math.abs(pp.y-P.y-P.h/2)<32){
      var pd2=POWERUPS[pp.type];
      powerups.splice(pi3,1);SFX.oneup();
      if(pd2.effect==='life'){P.lives=Math.min(P.lives+1,8);showMsg('❤️ +1 Life!',120);}
      else{P.powerupType=pd2.effect;P.powerupTimer=pd2.dur;showMsg(pd2.e+' '+pd2.name+'!',120);}
    }
  }
  // Power-up timers
  if(P.powerupTimer>0){P.powerupTimer--;if(P.powerupTimer<=0){P.powerupType=null;}}
  // Shield prevents damage
  // Invincible = full invincibility
  if(P.powerupType==='invic')P.invTimer=Math.max(P.invTimer,2);
}

function drawWeapons(){
  weapons.forEach(function(wp){
    if(!wp.alive)return;
    var wx2=scx(wp.x),wy2=wp.y+Math.sin(wp.bob)*5;
    if(wx2<-20||wx2>W+20)return;
    // Glow
    var wd3=WEAPONS[wp.type];
    g.globalAlpha=.35+.2*Math.abs(Math.sin(wp.bob));
    fC(wx2,wy2,16,wd3.col);g.globalAlpha=1;
    g.font='18px serif';g.textAlign='center';g.fillText(wd3.e,wx2,wy2+6);
    lbl(wd3.name,wx2,wy2-18,'rgba(255,255,255,.75)',7);
  });
  powerups.forEach(function(pp){
    if(!pp.alive)return;
    var px2=scx(pp.x),py2=pp.y+Math.sin(pp.bob)*6;
    if(px2<-20||px2>W+20)return;
    var pd3=POWERUPS[pp.type];
    g.globalAlpha=.4+.25*Math.abs(Math.sin(pp.bob));
    fC(px2,py2,14,pd3.col);g.globalAlpha=1;
    g.font='16px serif';g.textAlign='center';g.fillText(pd3.e,px2,py2+5);
    lbl(pd3.name,px2,py2-16,'rgba(255,255,255,.8)',7);
  });
}

function killBoss(){
  boss.dead=true;boss.deathTimer=1;SFX.win();P.score+=5000+stage*1000;
  burst(boss.x+boss.w/2,boss.y,'#880000',20);
  setTimeout(function(){
    if(stage<STAGES.length-1){stage++;nextStage();}else{state='win';}
  },3000);
}

// ── ENEMIES DRAW ──────────────────────────────────────────────
function drawEnemies(){
  for(var i=0;i<enemies.length;i++){
    var e=enemies[i];var esx=scx(e.x);if(esx<-70||esx>W+70)continue;
    if(!e.alive){if(e.deathAnim<18){drawZombie(esx,e.y,e,Math.max(0,1-e.deathAnim/18));e.deathAnim++;}continue;}
    var al=e.stunTimer>0&&Math.floor(tick/3)%2?.4:1;
    drawZombie(esx,e.y,e,al);
    if(e.initHp>1){for(var hi=0;hi<e.hp;hi++)fC(esx+e.w/2-e.initHp*5+hi*9,e.y-14,3,'#aa0000');}
  }
}

// ── OVERLAYS ─────────────────────────────────────────────────
function drawParticles(){particles.forEach(function(p){var al=Math.max(0,1-p.life/p.max);g.globalAlpha=al;fC(p.x-cam,p.y,3,p.col);});g.globalAlpha=1;}
// Canvas restart button bounds (updated each frame)
var _btnX=0,_btnY=0,_btnW=200,_btnH=48,_mx=0,_my=0;
function drawRestartBtn(label){
  var bx=W/2-_btnW/2,by=H/2+72;
  _btnX=bx;_btnY=by;
  // Shadow
  g.fillStyle='rgba(0,0,0,.5)';g.beginPath();g.roundRect(bx+4,by+4,_btnW,_btnH,12);g.fill();
  // Button
  var hover=_mx>bx&&_mx<bx+_btnW&&_my>by&&_my<by+_btnH;
  g.fillStyle=hover?'#cc1111':'#880000';
  g.beginPath();g.roundRect(bx,by,_btnW,_btnH,12);g.fill();
  g.strokeStyle='#ff4444';g.lineWidth=2;g.beginPath();g.roundRect(bx,by,_btnW,_btnH,12);g.stroke();
  lbl(label,W/2,by+31,'#fff',16);
}
function drawOver(){
  g.fillStyle='rgba(0,0,0,.9)';g.fillRect(0,0,W,H);
  lbl('YOU DIED',W/2,H/2-48,'#880000',52);
  lbl('Score: '+P.score,W/2,H/2+10,'#aa5555',16);
  drawRestartBtn('&#9654; PLAY AGAIN');
}
function drawWin(){
  g.fillStyle='rgba(0,0,0,.92)';g.fillRect(0,0,W,H);
  lbl('VICTORY!',W/2,H/2-52,'#cc2222',42);
  lbl('All 10 stages cleared!',W/2,H/2-4,'#886666',15);
  lbl('Score: '+P.score+'  Coins: '+coins,W/2,H/2+34,'#664444',13);
  drawRestartBtn('&#9654; PLAY AGAIN');
}

var _msg='',_msgT=0;
function showMsg(t,d){_msg=t;_msgT=d||120;}
function drawMsg(){
  if(_msgT>0){_msgT--;var al=Math.min(1,_msgT/20);
    g.globalAlpha=al;fRR(W/2-130,H*.42-18,260,32,8,'rgba(0,0,0,.82)');
    lbl(_msg,W/2,H*.42,'#ffd700',13);g.globalAlpha=1;}
}
function drawStageTitle(){
  if(tick<180){
    var al=tick<60?tick/60:tick>120?(180-tick)/60:1;
    g.globalAlpha=al;g.fillStyle='rgba(0,0,0,.7)';g.fillRect(W/2-200,H/2-40,400,80);
    lbl('STAGE '+(stage+1),W/2,H/2-10,'#aa2222',28);
    lbl(STAGES[stage].name,W/2,H/2+24,'#888888',16);
    g.globalAlpha=1;
  }
}

// ── RESTART / NEXT STAGE ─────────────────────────────────────
function nextStage(){
  cam=0;tick=0;particles=[];bolts=[];boltTimer=80;groanTimer=250;_msg='';_msgT=0;
  P.x=100;P.y=FLOOR-60;P.vx=0;P.vy=0;P.onGround=false;P.dir=1;
  P.invTimer=60;P.blastCd=0;P.dead=false;P.blasts=[];P.weapon=null;P.weaponAmmo=0;P.powerupTimer=0;P.powerupType=null;
  genStage(stage);
}
function restart(){
  stage=0;state='play';coins=0;coinProgress=0;
  P.lives=5;P.score=0;P.weapon=null;P.weaponAmmo=0;P.weaponTimer=0;P.powerupTimer=0;P.powerupType=null;
  nextStage();
}

// ── INPUT ────────────────────────────────────────────────────
document.addEventListener('keydown',function(e){
  keys[e.code]=true;startMusic();
  if(state!=='play'){return;}  // keyboard does nothing on death/win screens
  if(P.dead)return;
  if((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW')&&P.onGround){P.vy=-13.5;P.onGround=false;SFX.jump();}
    if((e.code==='KeyZ'||e.code==='KeyF')&&P.blastCd<=0){
      fireWeapon();
    }
});
document.addEventListener('keyup',function(e){delete keys[e.code];});
document.addEventListener('click',function(){startMusic();},{once:true});

// ── TOUCH ────────────────────────────────────────────────────
if(isTouch){
  document.getElementById('touch-ui').style.display='block';
  document.getElementById('ui').style.display='none';
  var BK={'b-left':'ArrowLeft','b-right':'ArrowRight','b-jump':'Space','b-blast':'KeyZ'};
  Object.keys(BK).forEach(function(id){
    var el=document.getElementById(id);if(!el)return;var code=BK[id];
    el.addEventListener('touchstart',function(e){e.preventDefault();startMusic();
      if(code==='Space'&&P.onGround){P.vy=-13.5;P.onGround=false;SFX.jump();}
      if(code==='KeyZ'&&P.blastCd<=0){fireWeapon();}
      keys[code]=true;el.classList.add('pressed');},{passive:false});
    el.addEventListener('touchend',function(e){e.preventDefault();delete keys[code];el.classList.remove('pressed');},{passive:false});
    el.addEventListener('touchcancel',function(e){e.preventDefault();delete keys[code];el.classList.remove('pressed');},{passive:false});
  });
  // Centre START button — restarts on death/win, does nothing mid-game
  var bst=document.getElementById('b-start');
  if(bst){
    bst.addEventListener('touchstart',function(e){e.preventDefault();startMusic();if(state!=='play')restart();},{passive:false});
    bst.addEventListener('click',function(){startMusic();if(state!=='play')restart();});
  }
  document.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
}

// ── MAIN LOOP ────────────────────────────────────────────────
// Mouse tracking for canvas restart button hover + click
cv.addEventListener('mousemove',function(e){var r=cv.getBoundingClientRect();_mx=e.clientX-r.left;_my=e.clientY-r.top;});
cv.addEventListener('click',function(e){
  if(state==='over'||state==='win'){
    var r=cv.getBoundingClientRect();var cx=e.clientX-r.left,cy=e.clientY-r.top;
    if(cx>_btnX&&cx<_btnX+_btnW&&cy>_btnY&&cy<_btnY+_btnH){startMusic();restart();}
  }
});
cv.addEventListener('touchend',function(e){
  if(state==='over'||state==='win'){
    var r=cv.getBoundingClientRect();var t=e.changedTouches[0];
    var cx=t.clientX-r.left,cy=t.clientY-r.top;
    if(cx>_btnX&&cx<_btnX+_btnW&&cy>_btnY&&cy<_btnY+_btnH){e.preventDefault();startMusic();restart();}
  }
},{passive:false});
genStage(0);
function loop(){
  requestAnimationFrame(loop);
  if(state==='play'){update();updateWeapons();}
  drawBG();drawWorld();drawWeapons();drawEnemies();drawBoss();drawBlasts();drawPlayer();drawParticles();drawHUD();drawMsg();
  if(state==='play')drawStageTitle();
  if(state==='over')drawOver();
  if(state==='win')drawWin();
}
loop();
</script></body></html>

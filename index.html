<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}

     height:100vh;overflow:hidden;touch-action:none;padding-top:0}
canvas{display:block;image-rendering:pixelated;border:2px solid #440000;
       box-shadow:0 0 40px #880000,0 0 80px #330000;
       margin:auto}
#ui{color:#664444;font:9px monospace;margin-top:3px;letter-spacing:1px}

/* ── TOUCH UI (portrait) ─────────────────────────────────────────── */
#touch-ui{position:fixed;bottom:0;left:0;right:0;height:170px;pointer-events:none;
           display:none;z-index:999;padding-bottom:env(safe-area-inset-bottom)}
/* D-pad: cross layout bottom-left */
#dpad{position:absolute;bottom:8px;left:8px;
      display:grid;grid-template-columns:50px 50px 50px;
      grid-template-rows:50px 50px 50px;gap:3px;pointer-events:all}
/* Right cluster: jump + blast */
#tr{position:absolute;bottom:8px;right:8px;
    display:flex;flex-direction:row;gap:8px;pointer-events:all}
/* Centre: START + SPEC stacked, sitting above the d-pad/tr row */
#centre-btns{position:absolute;bottom:10px;left:50%;
             transform:translateX(-50%);pointer-events:all;
             display:flex;flex-direction:column;gap:6px;align-items:center}
.tb{width:50px;height:50px;border-radius:50%;
    background:rgba(136,0,0,.35);
    border:2px solid rgba(220,60,60,.5);color:rgba(255,180,180,.9);font-size:18px;
    display:flex;align-items:center;justify-content:center;
    user-select:none;cursor:pointer;touch-action:none;
    box-shadow:0 0 12px rgba(136,0,0,.4);transition:background .1s}
.tb:active,.tb.pressed{background:rgba(180,0,0,.6);border-color:rgba(255,100,100,.9)}
.dpad-empty{width:50px;height:50px;} /* invisible spacer for d-pad corners */
.ctb{width:72px!important;height:32px!important;border-radius:10px!important;
     font-size:10px!important;font-weight:bold;font-family:monospace}

/* ── LANDSCAPE: single thin strip, full-width canvas ─────────────── */
@media(orientation:landscape){
  body{justify-content:flex-start;padding-top:0;align-items:flex-start}
  #touch-ui{height:80px}
  /* D-pad: exact px — NO transform so touch areas = visual areas */
  #dpad{grid-template-columns:32px 32px 32px;
        grid-template-rows:32px 32px 32px;
        gap:2px;bottom:6px;left:8px}
  .dpad-empty{width:32px!important;height:32px!important;
              background:none!important;border:none!important;box-shadow:none!important}
  .tb{width:32px!important;height:32px!important;font-size:12px!important;
      border-width:1px!important;border-radius:8px!important}
  #tr{bottom:22px;right:10px;gap:10px;flex-direction:row!important}
  #centre-btns{bottom:22px;gap:8px;flex-direction:row!important}
  .ctb{width:56px!important;height:32px!important;font-size:9px!important;border-radius:8px!important}
}
</style></head><body>

// ── AUDIO ──────────────────────────────────────────────────────

function AC(){if(!_ac)_ac=new(window.AudioContext||window.webkitAudioContext)();if(_ac.state==='suspended')_ac.resume();return _ac;}
function tn(f,d,t,v){try{var a=AC(),o=a.createOscillator(),gn=a.createGain();o.type=t||'square';o.frequency.value=f;gn.gain.setValueAtTime(v||.18,a.currentTime);gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);o.connect(gn);gn.connect(a.destination);o.start();o.stop(a.currentTime+d+.05);}catch(e){}}
function ns(d,v,fr){try{var a=AC(),b=a.createBuffer(1,a.sampleRate*.5,a.sampleRate),dt=b.getChannelData(0);for(var i=0;i<dt.length;i++)dt[i]=Math.random()*2-1;var s=a.createBufferSource(),f=a.createBiquadFilter(),gn=a.createGain();s.buffer=b;f.type='bandpass';f.frequency.value=fr||300;gn.gain.setValueAtTime(v||.3,a.currentTime);gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+d);s.connect(f);f.connect(gn);gn.connect(a.destination);s.start();s.stop(a.currentTime+d+.05);}catch(e){}}

// ── MUSIC ──────────────────────────────────────────────────────
var musicOn=false;
function startMusic(){
  if(musicOn)return;musicOn=true;
  var a=AC();
  var master=a.createGain();master.gain.value=.16;master.connect(a.destination);
  var rev=a.createConvolver();var len=a.sampleRate*4;var imp=a.createBuffer(2,len,a.sampleRate);
  for(var ch=0;ch<2;ch++){var d=imp.getChannelData(ch);for(var i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,2.2);}
  rev.buffer=imp;var rg=a.createGain();rg.gain.value=.55;rev.connect(rg);rg.connect(master);
  // Deep drones
  [[28,0,.7],[28,11,.4],[42,-7,.35],[56,5,.25],[21,0,.3]].forEach(function(p){
    var o=a.createOscillator(),lp=a.createBiquadFilter(),gn=a.createGain();
    o.type='sawtooth';o.frequency.value=p[0];o.detune.value=p[1];
    lp.type='lowpass';lp.frequency.value=240;gn.gain.value=p[2];
    o.connect(lp);lp.connect(gn);gn.connect(master);gn.connect(rev);o.start();
  });
  // Eerie pad
  var pad=a.createOscillator(),pg=a.createGain(),lfo=a.createOscillator(),lg=a.createGain();
  pad.type='sine';pad.frequency.value=82;pg.gain.value=.14;
  lfo.type='sine';lfo.frequency.value=.06;lg.gain.value=22;
  lfo.connect(lg);lg.connect(pad.frequency);pad.connect(pg);pg.connect(rev);pad.start();lfo.start();
  // Dissonant chord cluster
  [110,116,146,155].forEach(function(f){
    var o=a.createOscillator(),gn=a.createGain();o.type='sine';o.frequency.value=f;
    gn.gain.value=.05;o.connect(gn);gn.connect(rev);o.start();
  });
  // Wind
  var nb=a.createBuffer(1,a.sampleRate*2,a.sampleRate),nd=nb.getChannelData(0);
  for(var j=0;j<nd.length;j++)nd[j]=Math.random()*2-1;
  var ns2=a.createBufferSource();ns2.buffer=nb;ns2.loop=true;
  var nf=a.createBiquadFilter();nf.type='bandpass';nf.frequency.value=160;nf.Q.value=.4;
  var ng=a.createGain();ng.gain.value=.07;ns2.connect(nf);nf.connect(ng);ng.connect(master);ns2.start();
  // Melody
  var mel=[55,62,65,73,82,87,98,110];
  function note(){
    var a2=AC(),o2=a2.createOscillator(),g2=a2.createGain(),f2=a2.createBiquadFilter();
    o2.type='sine';o2.frequency.value=mel[Math.floor(Math.random()*mel.length)];
    f2.type='bandpass';f2.frequency.value=o2.frequency.value*1.5;f2.Q.value=5;
    g2.gain.setValueAtTime(0,a2.currentTime);g2.gain.linearRampToValueAtTime(.2,a2.currentTime+.7);
    g2.gain.exponentialRampToValueAtTime(.001,a2.currentTime+4.5);
    o2.connect(f2);f2.connect(g2);g2.connect(rev);o2.start();o2.stop(a2.currentTime+5);
    setTimeout(note,2500+Math.random()*5000);
  }
  setTimeout(note,1500);
}

// ── GENERATE STAGE ────────────────────────────────────────────
function genStage(si){
  _s=si*13+7;platforms=[];graves=[];souls=[];vials=[];enemies=[];weapons=[];powerups=[];obstacles=[];
  var sc=STAGES[si];
  platforms.push({x:0,y:FLOOR,w:WORLD,h:20,ground:true});
  // Tier heights: low = 1 jump, high = chain jump needed
  var LOW_MIN=55, LOW_MAX=Math.floor(FLOOR*0.35);          // 35% of floor height
  var HI_MIN=Math.floor(FLOOR*0.35), HI_MAX=Math.floor(FLOOR*0.75); // up to 75%
  var px=260;
  while(px<WORLD-500){
    var pw=ri(70,170);
    // Alternate low/high tiers so player can chain up
    var tier=Math.floor(px/600)%2;
    var py=FLOOR-ri(tier===0?LOW_MIN:HI_MIN, tier===0?LOW_MAX:HI_MAX);
    py=Math.max(py, 50);  // never above HUD
    platforms.push({x:px,y:py,w:pw,h:14,ground:false});
    // Souls on platforms

    if(rnd()<.18)powerups.push({x:px+pw*.3,y:py-26,alive:true,type:ri(0,POWERUPS.length),bob:rnd()*6.28});

    if(rnd()<.6){

    }

  }

  for(var wi=300;wi<WORLD-300;wi+=ri(280,420)){

  }

// ── DRAW BACKGROUND ───────────────────────────────────────────
function drawBG(){
  var sc=STAGES[stage];

  g.fillStyle=sk;g.fillRect(0,0,W,H);

    g.fillStyle=gw;g.beginPath();g.arc(mx,my,80,0,6.28);g.fill();
    // Stars
    for(var i=0;i<40;i++){var bx2=(i*137)%W,by2=(i*97)%(FLOOR*.8);g.globalAlpha=.4+.4*Math.abs(Math.sin(tick*.03+i));fC(bx2,by2,1,'white');g.globalAlpha=1;}
  }

  // Castle stage — stone walls background
  if(sc.castle){
    for(var ci=0;ci<8;ci++){
      var cwx=ci*(W/7)-cam*.05%W,cwy=0;
      g.fillStyle='#0e0c12';g.fillRect(cwx,0,W/8,FLOOR);
      // Battlements
      for(var bi=0;bi<5;bi++)fRR(cwx+bi*18,0,14,30,2,'#151220');

      fRR(cwx+20,80,30,50,3,'rgba(255,140,0,.15)');
      sRR(cwx+20,80,30,50,3,'#3a2a10',1);
      // Torch flicker
      g.globalAlpha=.4+.3*Math.sin(tick*.2+ci);
      fC(cwx+35,120,8,'#ff8800');g.globalAlpha=1;
    }
  }

  // Mountains parallax
  g.fillStyle=sc.sunny?'rgba(180,200,160,.4)':'#060206';
  g.beginPath();g.moveTo(0,FLOOR-20);
  for(var x=0;x<=W;x+=10)g.lineTo(x,FLOOR-20-Math.abs(Math.sin((x+cam*.07)*.006)*80+Math.sin((x+cam*.04)*.014)*40));
  g.lineTo(W,H);g.lineTo(0,H);g.closePath();g.fill();

    for(var ti=0;ti<12;ti++){
      var tbx=(ti*(WORLD/12)-cam*.3)%W;if(tbx<-100)tbx+=W+100;
      g.save();g.translate(tbx,FLOOR);g.strokeStyle='#150a04';g.lineCap='round';
      g.lineWidth=4;g.beginPath();g.moveTo(0,0);g.lineTo(0,-60);g.stroke();
      g.lineWidth=2;[[-20,-48,14],[-14,-36,-18],[16,-50,10]].forEach(function(b){g.beginPath();g.moveTo(0,b[1]);g.lineTo(b[0],b[1]+b[2]*.4);g.stroke();});
      g.restore();
    }
  }

  // Lightning bolts
  bolts.forEach(function(b,i){
    b.life--;
    g.save();g.shadowColor='#aaaaff';g.shadowBlur=16;
    g.strokeStyle='rgba(200,200,255,'+Math.min(1,b.life/3)+')';g.lineWidth=2;

  if(!sc.sunny){
    var fog=g.createLinearGradient(0,FLOOR-80,0,FLOOR+10);

  if((keys['ArrowDown']||keys['KeyS'])&&P.onGround&&!P.dead){P.dropping=12;}
  if(keys['ArrowLeft']||keys['KeyA']){P.vx-=P.onGround?1.8:1;P.dir=-1;}
  if(keys['ArrowRight']||keys['KeyD']){P.vx+=P.onGround?1.8:1;P.dir=1;}
  P.vx*=P.onGround?.8:.92;P.vy=Math.min(P.vy+GR,14);
  var pNextX=P.x+P.vx;
  for(var oi3=0;oi3<obstacles.length;oi3++){
    var ob3=obstacles[oi3];
    if(pNextX+P.w>ob3.x+3&&pNextX<ob3.x+ob3.w-3&&P.y+P.h>ob3.y+6&&P.y<ob3.y+ob3.h){
      pNextX=(P.vx>0)?ob3.x-P.w:ob3.x+ob3.w;
      P.vx=0;break;
    }
  }
  P.x=Math.max(0,pNextX);P.y+=P.vy;
  var tc=P.x-W*.35;if(tc>cam)cam=Math.min(tc,WORLD-W);cam=Math.max(0,cam);
  // Left boundary: push player right, grant brief invincibility — no life lost
  if(P.x<cam+20){P.x=cam+20;if(P.invTimer<=0)P.invTimer=30;}
  if(P.x+P.w>cam+W-20)P.x=cam+W-P.w-20;
  P.onGround=false;
  var pp=landOn(P.x,P.y,P.w,P.h,P.vy,P.dropping>0);if(pp){P.y=pp.y-P.h;P.vy=0;P.onGround=true;}

  if(P.invTimer>0)P.invTimer--;if(P.blastCd>0)P.blastCd--;

  // Blasts (short range — max 250px travel)
  for(var bi=P.blasts.length-1;bi>=0;bi--){
    var b=P.blasts[bi];if(!b.alive){P.blasts.splice(bi,1);continue;}
    b.x+=b.vx;b.y+=b.vy;b.vy+=.3;b.rot+=.28;b.traveled+=Math.abs(b.vx);
    var maxBounce=P.weapon?WEAPONS[P.weapon].bounce:4;
    var maxTravel=P.weapon&&WEAPONS[P.weapon].pierce?W*6:1140;
    // Ground bounce
    if(b.y>=FLOOR-4){b.vy=-(Math.abs(b.vy)*.78+2);b.bounces++;if(b.bounces>maxBounce||Math.abs(b.vy)<1.5)b.alive=false;}
    // Platform bounce
    if(b.alive){
      for(var bpi=0;bpi<platforms.length;bpi++){
        var bp2=platforms[bpi];if(bp2.ground)continue;
        var inX=b.x>bp2.x&&b.x<bp2.x+bp2.w;

          b.bounces++;if(b.bounces>maxBounce)b.alive=false;break;
        }
      }
    }
    // Obstacle bounce
    if(b.alive){
      for(var boi=0;boi<obstacles.length;boi++){
        var bo2=obstacles[boi];
        var oxL=b.x>bo2.x&&b.x<bo2.x+bo2.w;
        var oyL=b.y>bo2.y&&b.y<bo2.y+bo2.h;
        if(oxL&&oyL){
          // Determine which face was hit by looking at approach direction
          var fromTop=b.vy>0&&(b.y-b.vy)<bo2.y;
          var fromBottom=b.vy<0&&(b.y-b.vy)>bo2.y+bo2.h;
          if(fromTop){b.y=bo2.y-1;b.vy=-(Math.abs(b.vy)*.72+1);}
          else if(fromBottom){b.y=bo2.y+bo2.h+1;b.vy=Math.abs(b.vy)*.6;}
          else{b.vx*=-1;if(b.vx>0)b.x=bo2.x+bo2.w+1;else b.x=bo2.x-1;}

        }
      }
    }
    if(b.traveled>maxTravel||b.x<cam-800||b.x>cam+W+800)b.alive=false;
    for(var ei2=0;ei2<enemies.length;ei2++){var e=enemies[ei2];if(!e.alive||!b.alive)continue;if(Math.abs(b.x-e.x-e.w/2)<e.w/2+8&&Math.abs(b.y-e.y-e.h/2)<e.h/2+8){var bdmg=(b.dmg||1)*(P.powerupType==='dmg2x'?2:1);e.hp-=bdmg;if(!b.pierce)b.alive=false;SFX.stomp();burst(e.x+e.w/2,e.y,'#660000',5);if(b.explode){enemies.forEach(function(e3){if(!e3.alive||e3===e)return;if(Math.hypot(b.x-e3.x-e3.w/2,b.y-e3.y-e3.h/2)<60){e3.hp-=bdmg;burst(e3.x+e3.w/2,e3.y,'#ff4400',3);}});}if(e.hp<=0){e.alive=false;P.score+=e.pts;P.specialMeter=Math.min(100,P.specialMeter+10);burst(e.x+e.w/2,e.y,'#440000',8);}}}
    if(b.alive&&boss.active&&boss.alive&&!boss.dead){if(Math.abs(b.x-(boss.x+boss.w/2))<boss.w/2+10&&Math.abs(b.y-(boss.y+boss.h/2))<boss.h/2+10){var bbd=(b.dmg||1)*(P.powerupType==='dmg2x'?2:1);boss.hp-=bbd;boss.hitTimer=18;if(!b.pierce)b.alive=false;SFX.hurt();burst(boss.x+boss.w/2,boss.y,'#4400aa',6);if(boss.hp<=0)killBoss();}}
  }

  // Coins
  for(var si=souls.length-1;si>=0;si--){var s=souls[si];if(!s.alive)continue;if(Math.abs(s.x-P.x-P.w/2)<22&&Math.abs(s.y-P.y-P.h/2)<28){s.alive=false;coins++;coinProgress++;P.score+=10;SFX.soul();if(coinProgress>=100){P.lives=Math.min(P.lives+1,8);coinProgress=0;SFX.oneup();}}}
  for(var vi=vials.length-1;vi>=0;vi--){var v=vials[vi];if(!v.alive)continue;if(Math.abs(v.x-P.x-P.w/2)<22&&Math.abs(v.y-P.y-P.h/2)<30){v.alive=false;P.lives=Math.min(P.lives+1,8);SFX.oneup();}}

  // Graves

    if(gr.state==='shaking'){gr.shakeX=Math.floor(Math.random()*7-3);gr.timer--;burst(gr.x,FLOOR-10,'#2a1808',1);if(gr.timer<=0){gr.state='emerging';gr.emergeY=0;gr.shakeX=0;var zt2=gr.type;var zz={x:gr.x-zt2.sz/2,y:FLOOR-zt2.sz,vx:-zt2.spd,vy:0,w:zt2.sz,h:zt2.sz,dir:-1,alive:true,deathAnim:0,stunTimer:0,hp:zt2.hp,initHp:zt2.hp,col:zt2.col,eye:zt2.eye,spd:zt2.spd,pts:zt2.pts};gr.zombie=zz;enemies.push(zz);}}
    if(gr.state==='emerging'){gr.emergeY+=.025;if(gr.emergeY>=1){gr.emergeY=1;gr.state='done';}}
  }

  // Enemies
  for(var ei3=0;ei3<enemies.length;ei3++){
    var e2=enemies[ei3];if(!e2.alive)continue;if(Math.abs(e2.x-(cam+W/2))>W+80)continue;
    if(e2.stunTimer>0){e2.stunTimer--;continue;}

    // Obstacle collision — enemy bounces off

    for(var oi2=0;oi2<obstacles.length;oi2++){
      var ob2=obstacles[oi2];
      if(nextX+e2.w>ob2.x+2&&nextX<ob2.x+ob2.w-2&&e2.y+e2.h>ob2.y+4&&e2.y<ob2.y+ob2.h){
        e2.vx*=-1;e2.dir*=-1;hitObs=true;break;
      }
    }
    if(!hitObs)e2.x=nextX;
    e2.vy=Math.min(e2.vy+GR,14);e2.y+=e2.vy;
    var ep=landOn(e2.x,e2.y,e2.w,e2.h,e2.vy);if(ep){e2.y=ep.y-e2.h;e2.vy=0;}
    if(e2.y>H+50){e2.y=FLOOR-e2.h;e2.vy=0;}
    if(e2.x<cam-120||e2.x>cam+W+100){e2.vx*=-1;e2.dir*=-1;}

    if(P.invTimer>0)continue;

    if(Math.abs(dx2)<e2.w/2+12&&Math.abs(dy2)<e2.h/2+18){

    // Sword tip
    var stx=boss.x+boss.w*.5+Math.sin(boss.swingAngle+.2)*88*boss.dir,sty=boss.y+boss.h*.3-Math.cos(boss.swingAngle+.2)*88;

    boss.jumpCd--;if(boss.jumpCd<=0&&Math.abs(P.x-(boss.x+boss.w/2))<360){boss.vy=-(en2?15:12);boss.jumpCd=200+(en2?-70:0);SFX.boss();}
    boss.shootCd--;if(boss.shootCd<=0){var bd=P.x<boss.x?-1:1;boss.projs.push({x:boss.x+boss.w/2,y:boss.y+boss.h*.25,vx:bd*(en2?7:5),vy:-4,alive:true,rot:0});boss.shootCd=en2?50:85;}
    for(var pi2=boss.projs.length-1;pi2>=0;pi2--){var bp=boss.projs[pi2];bp.x+=bp.vx;bp.y+=bp.vy;bp.vy+=.35;if(bp.y>FLOOR){boss.projs.splice(pi2,1);continue;}if(P.invTimer<=0&&Math.abs(bp.x-(P.x+P.w/2))<20&&Math.abs(bp.y-(P.y+P.h/2))<20){boss.projs.splice(pi2,1);P.invTimer=110;P.vy=-5;P.vx=bp.vx>0?-4:4;SFX.hurt();P.lives--;burst(P.x+P.w/2,P.y,'#660000',4);if(P.lives<=0){P.dead=true;P.deathVy=-10;}}}

function fireWeapon(){

  SFX.blast();
  if(!P.weapon||P.weaponAmmo<=0){
    // Default spirit blast — lower angle, continuous bounce
    P.blasts.push({x:P.x+P.w/2,y:P.y+P.h*.65,vx:P.dir*10,vy:0.4,alive:true,bounces:0,rot:0,traveled:0,dmg:1,col:'#4488ff',pierce:false,explode:false});
    P.blastCd=16;
  }else{
    var wd=WEAPONS[P.weapon];
    if(wd.melee){
      // Melee swing — instant arc damage
      var range=wd.range||70;
      enemies.forEach(function(e){if(!e.alive)return;var dx=e.x+e.w/2-(P.x+P.w/2);if(Math.abs(dx)<range&&Math.abs(e.y-P.y)<50&&(P.dir>0?dx>-20:dx<20)){e.hp-=wd.dmg;burst(e.x+e.w/2,e.y,'#cc0000',6);if(e.hp<=0){e.alive=false;P.score+=e.pts;}}});
      if(boss.active&&boss.alive&&!boss.dead){var dx2=boss.x+boss.w/2-(P.x+P.w/2);if(Math.abs(dx2)<(wd.range+40)&&Math.abs(boss.y-P.y)<60){boss.hp-=wd.dmg;boss.hitTimer=20;burst(boss.x+boss.w/2,boss.y,'#cc0000',8);if(boss.hp<=0)killBoss();}}
      burst(P.x+P.w/2+(P.dir*40),P.y+P.h/2,'#ffcc00',4);
      P.weaponAmmo--;
    }else{
      // Projectile weapon
      for(var si2=0;si2<wd.multi;si2++){
        var spread=(si2-(wd.multi-1)/2)*wd.spread;
        P.blasts.push({x:P.x+P.w/2,y:P.y+P.h*.65,vx:P.dir*wd.vx,vy:wd.vy+spread,alive:true,bounces:0,rot:0,traveled:0,dmg:wd.dmg,col:wd.col,pierce:!!wd.pierce,explode:!!wd.explode});
      }
      P.weaponAmmo--;
    }
    if(P.weaponAmmo<=0){P.weapon=null;showMsg('Out of ammo!',90);}
    P.blastCd=P.weapon!=null?WEAPONS[P.weapon].cd:16;
  }
}

function updateWeapons(){
  // Weapon pickups
  for(var wi2=weapons.length-1;wi2>=0;wi2--){
    var wp=weapons[wi2];if(!wp.alive)continue;
    wp.bob+=.1;
    var magnet=P.powerupType==='magnet';
    if(magnet){var dx3=P.x+P.w/2-wp.x,dy3=P.y-wp.y;var dd=Math.sqrt(dx3*dx3+dy3*dy3);if(dd<200){wp.x+=dx3/dd*4;wp.y+=dy3/dd*4;}}
    if(Math.abs(wp.x-P.x-P.w/2)<28&&Math.abs(wp.y-P.y-P.h/2)<32){
      var wd2=WEAPONS[wp.type];
      P.weapon=wp.type;P.weaponAmmo=wd2.ammo;
      weapons.splice(wi2,1);SFX.soul();
      showMsg(wd2.e+' '+wd2.name+' x'+wd2.ammo+'!',120);
    }
  }
  // Power-up pickups
  for(var pi3=powerups.length-1;pi3>=0;pi3--){
    var pp=powerups[pi3];if(!pp.alive)continue;
    pp.bob+=.08;
    if(Math.abs(pp.x-P.x-P.w/2)<28&&Math.abs(pp.y-P.y-P.h/2)<32){
      var pd2=POWERUPS[pp.type];
      powerups.splice(pi3,1);SFX.oneup();
      if(pd2.effect==='life'){P.lives=Math.min(P.lives+1,8);showMsg('❤️ +1 Life!',120);}
      else{P.powerupType=pd2.effect;P.powerupTimer=pd2.dur;showMsg(pd2.e+' '+pd2.name+'!',120);}
    }
  }
  // Power-up timers
  if(P.powerupTimer>0){P.powerupTimer--;if(P.powerupTimer<=0){P.powerupType=null;}}
  // Shield prevents damage
  // Invincible = full invincibility
  if(P.powerupType==='invic')P.invTimer=Math.max(P.invTimer,2);
}

function drawSpecialEffects(){
  if(P.specialActive===2&&P.specialTimer>0){// Mya heart bomb
    var ht=90-P.specialTimer; // 0..90
    var exploding=P.specialTimer<=30;
    var scale2=exploding?(1+(30-P.specialTimer)/30*2):(ht/60);
    var alpha2=exploding?Math.max(0,(P.specialTimer)/30):0.85;
    var hx=W/2,hy=H/2;
    g.globalAlpha=alpha2;
    g.fillStyle=exploding?'#ffffff':'#ff2266';
    var hs=Math.max(1,scale2*Math.min(W,H)*0.55);
    // Draw heart path scaled
    g.save();g.translate(hx,hy);g.scale(hs/100,hs/100);
    g.beginPath();
    g.moveTo(0,-30);
    g.bezierCurveTo(50,-80,100,-20,0,40);
    g.bezierCurveTo(-100,-20,-50,-80,0,-30);
    g.closePath();g.fill();
    if(!exploding){
      g.fillStyle='rgba(255,100,180,.4)';
      g.save();g.scale(0.7,0.7);g.translate(-10,-10);
      g.beginPath();g.moveTo(0,-30);g.bezierCurveTo(50,-80,100,-20,0,40);g.bezierCurveTo(-100,-20,-50,-80,0,-30);g.closePath();g.fill();
      g.restore();
    }
    g.restore();
    g.globalAlpha=1;
    // Screen tint on explode

      g.globalAlpha=(30-P.specialTimer)/10*.6;

    }
  }
  if(P.specialActive===5&&P.specialTimer>0){// Superman heat vision trail

  }

    var lx=scx(P.x+P.w/2),ly=P.y+P.h/2;
    var prog=(180-P.specialTimer)/180;

function drawObstacles(){
  for(var oi=0;oi<obstacles.length;oi++){
    var ob=obstacles[oi];
    var ox2=scx(ob.x);
    if(ox2<-60||ox2>W+60)continue;
    var oy2=ob.y, ow=ob.w, oh=ob.h;
    // Glow outline so obstacles read clearly against everything else
    g.shadowColor='#ff8800';g.shadowBlur=12;
    g.strokeStyle='rgba(255,180,60,.9)';g.lineWidth=2;
    g.beginPath();g.roundRect(ox2-1,oy2-1,ow+2,oh+2,3);g.stroke();
    g.shadowBlur=0;
    if(ob.t==='wall'){
      // Stone wall — brick pattern
      fRR(ox2,oy2,ow,oh,2,ob.col);
      g.strokeStyle=ob.col2;g.lineWidth=1;
      var bh2=12,bw2=ow/2;
      for(var br=0;br*bh2<oh;br++){
        var off=br%2===0?0:bw2/2;
        g.beginPath();g.moveTo(ox2,oy2+br*bh2);g.lineTo(ox2+ow,oy2+br*bh2);g.stroke();
        g.beginPath();g.moveTo(ox2+off,oy2+br*bh2);g.lineTo(ox2+off,oy2+Math.min((br+1)*bh2,oh));g.stroke();
        g.beginPath();g.moveTo(ox2+off+bw2,oy2+br*bh2);g.lineTo(ox2+off+bw2,oy2+Math.min((br+1)*bh2,oh));g.stroke();
      }
      // Top edge highlight
      g.fillStyle='rgba(255,255,255,.08)';g.fillRect(ox2,oy2,ow,4);
    } else if(ob.t==='crate'){
      fRR(ox2,oy2,ow,oh,3,ob.col);
      g.strokeStyle=ob.col2;g.lineWidth=1.5;
      g.strokeRect(ox2+3,oy2+3,ow-6,oh-6);
      g.beginPath();g.moveTo(ox2,oy2);g.lineTo(ox2+ow,oy2+oh);g.stroke();
      g.beginPath();g.moveTo(ox2+ow,oy2);g.lineTo(ox2,oy2+oh);g.stroke();
      g.fillStyle='rgba(255,220,140,.1)';g.fillRect(ox2,oy2,ow,6);
    } else if(ob.t==='fence'){
      // Vertical post + crossbars
      fRR(ox2,oy2,ow,oh,2,ob.col);
      fRR(ox2-4,oy2,ow+8,6,2,ob.col2);
      fRR(ox2-4,oy2+oh*.4,ow+8,6,2,ob.col2);
      fRR(ox2-4,oy2+oh*.72,ow+8,6,2,ob.col2);
      g.fillStyle='rgba(255,255,255,.06)';g.fillRect(ox2,oy2,4,oh);
    } else if(ob.t==='barrel'){
      // Rounded barrel
      g.fillStyle=ob.col;g.beginPath();g.ellipse(ox2+ow/2,oy2+oh/2,ow/2,oh/2,0,0,6.28);g.fill();
      g.strokeStyle=ob.col2;g.lineWidth=3;
      [.25,.5,.75].forEach(function(p){
        g.beginPath();g.ellipse(ox2+ow/2,oy2+oh*p,ow/2*.9,3,0,0,6.28);g.stroke();
      });
      g.fillStyle='rgba(255,255,255,.12)';
      g.beginPath();g.ellipse(ox2+ow*.35,oy2+oh*.3,ow*.12,oh*.12,-.3,0,6.28);g.fill();
    } else { // slab
      fRR(ox2,oy2,ow,oh,3,ob.col);
      fRR(ox2,oy2,ow,6,2,'rgba(255,255,255,.1)');
      fRR(ox2,oy2+oh-4,ow,4,2,ob.col2);
      g.strokeStyle=ob.col2;g.lineWidth=1;
      for(var sl=1;sl<3;sl++){g.beginPath();g.moveTo(ox2+sl*(ow/3),oy2+6);g.lineTo(ox2+sl*(ow/3),oy2+oh-4);g.stroke();}
    }
  }
}

}

      if((code==='Space'||code==='ArrowUp')&&P.onGround){P.vy=-15.5;P.onGround=false;SFX.jump();}
      if(code==='ArrowDown'&&P.onGround)P.dropping=12;
      if(code==='KeyZ'&&P.blastCd<=0){fireWeapon();}
      keys[code]=true;el.classList.add('pressed');},{passive:false});
    el.addEventListener('touchend',function(e){e.preventDefault();delete keys[code];el.classList.remove('pressed');},{passive:false});
    el.addEventListener('touchcancel',function(e){e.preventDefault();delete keys[code];el.classList.remove('pressed');},{passive:false});
  });
  // Centre START button — restarts on death/win, does nothing mid-game
  var bspec=document.getElementById('b-special');
  if(bspec){
    bspec.addEventListener('touchstart',function(e){e.preventDefault();fireSpecial();},{passive:false});
    bspec.addEventListener('click',function(){fireSpecial();});
  }
  var bst=document.getElementById('b-start');
  if(bst){
    bst.addEventListener('touchstart',function(e){e.preventDefault();startMusic();
      if(state==='select'){startMusic();if(_resumeAfterCharSelect){_resumeAfterCharSelect=false;state='play';}else{state='play';restart();}}
      else if(state==='play'){state='paused';}
      else if(state==='paused'){state='play';}
      else if(state==='over'||state==='win'){state='select';}
    },{passive:false});
    bst.addEventListener('click',function(){startMusic();
      if(state==='select'){startMusic();if(_resumeAfterCharSelect){_resumeAfterCharSelect=false;state='play';}else{state='play';restart();}}
      else if(state==='play'){state='paused';}
      else if(state==='paused'){state='play';}
      else if(state==='over'||state==='win'){state='select';}
    });
  }
  document.addEventListener('touchmove',function(e){e.preventDefault();},{passive:false});
}

// ── MAIN LOOP ────────────────────────────────────────────────
// Mouse tracking for canvas restart button hover + click
cv.addEventListener('mousemove',function(e){
  var p=_cvCoords(e.clientX,e.clientY);_mx=p.x;_my=p.y;
  // Hover on char select cards
  if(state==='select'&&drawCharSelect._cards){
    var pm=_cvCoords(e.clientX,e.clientY);
    _mx=pm.x;_my=pm.y;
    _selHover=-1;
    drawCharSelect._cards.forEach(function(c){
      if(_mx>c.x&&_mx<c.x+c.w&&_my>c.y&&_my<c.y+c.h)_selHover=c.i;
    });
  }
});
function handleSelectClick(cx,cy){
  if(state!=='select')return;
  if(drawCharSelect._cards){
    drawCharSelect._cards.forEach(function(c){
      if(cx>c.x&&cx<c.x+c.w&&cy>c.y&&cy<c.y+c.h)selectedChar=c.i;
    });
  }
  var b=drawCharSelect;
  if(b._bx&&cx>b._bx&&cx<b._bx+b._bw&&cy>b._by&&cy<b._by+b._bh){
    startMusic();
    if(_resumeAfterCharSelect){
      // Just swap the skin and go back — no restart
      _resumeAfterCharSelect=false;
      state='play';
    } else {
      state='play';restart();
    }
  }
}
cv.addEventListener('click',function(e){
  var p=_cvCoords(e.clientX,e.clientY);var cx=p.x,cy=p.y;
  if(state==='select'){handleSelectClick(cx,cy);return;}
  if(state==='paused'){
    var dp=drawPause;
    if(dp&&dp._prx&&cx>dp._prx&&cx<dp._prx+dp._prw&&cy>dp._pry&&cy<dp._pry+dp._prh){state='play';return;}
    if(dp&&dp._ccx&&cx>dp._ccx&&cx<dp._ccx+dp._ccw&&cy>dp._ccy&&cy<dp._ccy+dp._cch){
      _resumeAfterCharSelect=true;state='select';return;
    }
  }
  if(state==='over'||state==='win'){
    state='select';return;
  }
});
function _cvCoords(clientX,clientY){
  // Scale raw client coords to canvas logical pixels — fixes landscape mismatch
  var r=cv.getBoundingClientRect();
  return {
    x:(clientX-r.left)*(cv.width/r.width),
    y:(clientY-r.top)*(cv.height/r.height)
  };
}
cv.addEventListener('touchend',function(e){
  var t=e.changedTouches[0];
  var p=_cvCoords(t.clientX,t.clientY);var cx=p.x,cy=p.y;
  if(state==='select'){e.preventDefault();handleSelectClick(cx,cy);return;}
  if(state==='paused'){
    var dp2=drawPause;
    if(dp2&&dp2._prx&&cx>dp2._prx&&cx<dp2._prx+dp2._prw&&cy>dp2._pry&&cy<dp2._pry+dp2._prh){e.preventDefault();state='play';return;}
    if(dp2&&dp2._ccx&&cx>dp2._ccx&&cx<dp2._ccx+dp2._ccw&&cy>dp2._ccy&&cy<dp2._ccy+dp2._cch){
      e.preventDefault();_resumeAfterCharSelect=true;state='select';return;
    }
  }
  if(state==='over'||state==='win'){
    if(cx>_btnX&&cx<_btnX+_btnW&&cy>_btnY&&cy<_btnY+_btnH){e.preventDefault();startMusic();restart();}
  }
},{passive:false});
genStage(0);
function loop(){
  requestAnimationFrame(loop);
  if(state==='play'){update();updateWeapons();updateSpecial();}
  if(state==='select'){drawCharSelect();return;}
  drawBG();drawWorld();drawObstacles();drawWeapons();drawEnemies();drawBoss();drawBlasts();drawPlayer();drawParticles();drawSpecialEffects();drawHUD();drawSpecialMeter();drawMsg();
  if(state==='play')drawStageTitle();
  if(state==='paused'){
    g.fillStyle='rgba(0,0,0,.72)';g.fillRect(0,0,W,H);
    lbl('PAUSED',W/2,H/2-60,'#ffffff',36);
    // Resume button
    var prx=W/2-80,pry=H/2-20,prw=160,prh=44;
    var prh2=_mx>prx&&_mx<prx+prw&&_my>pry&&_my<pry+prh;
    g.fillStyle=prh2?'#cc1111':'#880000';
    g.beginPath();g.roundRect(prx,pry,prw,prh,10);g.fill();
    g.strokeStyle='#ff4444';g.lineWidth=2;g.beginPath();g.roundRect(prx,pry,prw,prh,10);g.stroke();
    lbl('\u25b6 RESUME',W/2,pry+29,'#fff',15);
    // Change character button
    var ccx=W/2-80,ccy=H/2+36,ccw=160,cch=38;
    var cch2=_mx>ccx&&_mx<ccx+ccw&&_my>ccy&&_my<ccy+cch;
    g.fillStyle=cch2?'#444':'#222';
    g.beginPath();g.roundRect(ccx,ccy,ccw,cch,10);g.fill();
    g.strokeStyle='#888';g.lineWidth=1.5;g.beginPath();g.roundRect(ccx,ccy,ccw,cch,10);g.stroke();
    lbl('\ud83c\udfae Change Character',W/2,ccy+25,'#ccc',12);
    // Store bounds
    drawPause._prx=prx;drawPause._pry=pry;drawPause._prw=prw;drawPause._prh=prh;
    drawPause._ccx=ccx;drawPause._ccy=ccy;drawPause._ccw=ccw;drawPause._cch=cch;
  }
  if(state==='over')drawOver();
  if(state==='win')drawWin();
}
loop();
</script></body></html>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
<title>PupBot - Dead of Night</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body { background:#000; display:flex; flex-direction:column; align-items:center;
         justify-content:center; height:100vh; overflow:hidden; touch-action:none; }
  canvas { display:block; border:2px solid #440000;
           box-shadow: 0 0 40px #880000, 0 0 80px #330000; }
  #ui { color:#664444; font:10px monospace; margin-top:3px; letter-spacing:1px; }
  /* ── Touch Controls ── */
  #touch-ui { position:fixed; bottom:0; left:0; right:0; height:130px;
              pointer-events:none; display:none; z-index:999; }
  .t-zone { position:absolute; bottom:8px; display:flex; gap:6px; pointer-events:all; }
  #t-left  { left:10px; }
  #t-right { right:10px; }
  .t-btn {
    width:62px; height:62px; border-radius:50%;
    background:rgba(136,0,0,0.35); border:2px solid rgba(220,60,60,0.5);
    color:rgba(255,180,180,0.9); font-size:22px;
    display:flex; align-items:center; justify-content:center;
    user-select:none; cursor:pointer; touch-action:none;
    box-shadow: 0 0 12px rgba(136,0,0,0.4);
    transition: background 0.1s;
  }
  .t-btn:active, .t-btn.pressed {
    background:rgba(180,0,0,0.6); border-color:rgba(255,100,100,0.9);
    box-shadow: 0 0 20px rgba(200,0,0,0.6);
  }
  .t-btn.wide { width:80px; border-radius:18px; font-size:13px; font-weight:bold;
                font-family:monospace; letter-spacing:1px; }
  #t-mid { left:50%; transform:translateX(-50%); bottom:10px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">ARROWS/WASD=MOVE &nbsp;|&nbsp; SPACE=JUMP &nbsp;|&nbsp; Z=SPIRIT BLAST &nbsp;|&nbsp; STOMP ZOMBIES</div>

<!-- Touch Controls -->
<div id="touch-ui">
  <div class="t-zone" id="t-left">
    <div class="t-btn" id="btn-left">&#9664;</div>
    <div class="t-btn" id="btn-right">&#9654;</div>
  </div>
  <div class="t-zone" id="t-mid">
    <div class="t-btn wide" id="btn-blast">&#128293; BLAST</div>
  </div>
  <div class="t-zone" id="t-right">
    <div class="t-btn" id="btn-jump">&#9650; JUMP</div>
  </div>
</div>
<script>
'use strict';

// ============================================================
//  SETUP
// ============================================================
var cv = document.getElementById('c');
var W  = Math.min(window.innerWidth  - 4, 900);
var H  = Math.min(window.innerHeight - 40, 520);
cv.width = W; cv.height = H;
var g = cv.getContext('2d');

// roundRect polyfill
if (!g.roundRect) {
  g.roundRect = function(x,y,w,h,r) {
    r = Math.min(+r||0, w/2, h/2);
    this.beginPath();
    this.moveTo(x+r,y); this.lineTo(x+w-r,y);
    this.arcTo(x+w,y,x+w,y+r,r);
    this.lineTo(x+w,y+h-r);
    this.arcTo(x+w,y+h,x+w-r,y+h,r);
    this.lineTo(x+r,y+h);
    this.arcTo(x,y+h,x,y+h-r,r);
    this.lineTo(x,y+r);
    this.arcTo(x,y,x+r,y,r);
    this.closePath();
    return this;
  };
}

var FLOOR  = H - 70;
var WORLD  = 6400;
var GRAVITY = 0.52;

// ============================================================
//  AUDIO ENGINE
// ============================================================
var actx = null;
function getAC() {
  if (!actx) actx = new (window.AudioContext || window.webkitAudioContext)();
  if (actx.state === 'suspended') actx.resume();
  return actx;
}

// --- Eerie background music ---
var musicStarted = false;
function startMusic() {
  if (musicStarted) return;
  musicStarted = true;
  var a = getAC();

  // Master gain
  var master = a.createGain();
  master.gain.value = 0.18;
  master.connect(a.destination);

  // Reverb (convolver via impulse)
  var rev = a.createConvolver();
  var len = a.sampleRate * 3;
  var imp = a.createBuffer(2, len, a.sampleRate);
  for (var ch = 0; ch < 2; ch++) {
    var d = imp.getChannelData(ch);
    for (var i = 0; i < len; i++) d[i] = (Math.random()*2-1) * Math.pow(1 - i/len, 2.5);
  }
  rev.buffer = imp;
  var revGain = a.createGain(); revGain.gain.value = 0.45;
  rev.connect(revGain); revGain.connect(master);

  // Deep drone (two detuned oscillators)
  function drone(freq, detune, vol) {
    var o = a.createOscillator();
    var lp = a.createBiquadFilter();
    var gn = a.createGain();
    o.type = 'sawtooth'; o.frequency.value = freq; o.detune.value = detune;
    lp.type = 'lowpass'; lp.frequency.value = 280;
    gn.gain.value = vol;
    o.connect(lp); lp.connect(gn); gn.connect(master); gn.connect(rev);
    o.start(); return o;
  }
  drone(36, 0, 0.6); drone(36, 8, 0.4); drone(54, -5, 0.3); drone(72, 3, 0.2);

  // LFO wobble on a pad
  var pad = a.createOscillator();
  var padGain = a.createGain();
  var lfo = a.createOscillator();
  var lfoGain = a.createGain();
  pad.type = 'sine'; pad.frequency.value = 108;
  padGain.gain.value = 0.12;
  lfo.type = 'sine'; lfo.frequency.value = 0.08;
  lfoGain.gain.value = 18;
  lfo.connect(lfoGain); lfoGain.connect(pad.frequency);
  pad.connect(padGain); padGain.connect(rev);
  pad.start(); lfo.start();

  // Eerie melody (slow random notes from minor pentatonic)
  var melNotes = [55, 65, 73, 82, 98, 110, 130];
  function playMelNote() {
    var a2 = getAC();
    var o2 = a2.createOscillator();
    var g2 = a2.createGain();
    var f2 = a2.createBiquadFilter();
    o2.type = 'sine';
    o2.frequency.value = melNotes[Math.floor(Math.random() * melNotes.length)];
    f2.type = 'bandpass'; f2.frequency.value = o2.frequency.value * 2; f2.Q.value = 4;
    g2.gain.setValueAtTime(0, a2.currentTime);
    g2.gain.linearRampToValueAtTime(0.22, a2.currentTime + 0.6);
    g2.gain.exponentialRampToValueAtTime(0.001, a2.currentTime + 4);
    o2.connect(f2); f2.connect(g2); g2.connect(rev);
    o2.start(); o2.stop(a2.currentTime + 5);
    setTimeout(playMelNote, 3000 + Math.random() * 5000);
  }
  setTimeout(playMelNote, 2000);

  // Wind noise
  var noise = a.createBuffer(1, a.sampleRate * 2, a.sampleRate);
  var nd = noise.getChannelData(0);
  for (var j = 0; j < nd.length; j++) nd[j] = Math.random()*2-1;
  var nSrc = a.createBufferSource(); nSrc.buffer = noise; nSrc.loop = true;
  var nFilt = a.createBiquadFilter(); nFilt.type='bandpass'; nFilt.frequency.value=180; nFilt.Q.value=0.5;
  var nGain = a.createGain(); nGain.gain.value = 0.08;
  nSrc.connect(nFilt); nFilt.connect(nGain); nGain.connect(master);
  nSrc.start();
}

// --- SFX ---
function sfxTone(freq, dur, type, vol) {
  try {
    var a=getAC(), o=a.createOscillator(), gn=a.createGain();
    o.type=type||'square'; o.frequency.value=freq;
    gn.gain.setValueAtTime(vol||0.2, a.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
    o.connect(gn); gn.connect(a.destination);
    o.start(); o.stop(a.currentTime+dur+0.05);
  } catch(e) {}
}
function sfxNoise(dur, vol, freq) {
  try {
    var a=getAC(), b=a.createBuffer(1,a.sampleRate*0.5,a.sampleRate), d=b.getChannelData(0);
    for(var i=0;i<d.length;i++) d[i]=Math.random()*2-1;
    var s=a.createBufferSource(), f=a.createBiquadFilter(), gn=a.createGain();
    s.buffer=b; f.type='bandpass'; f.frequency.value=freq||300;
    gn.gain.setValueAtTime(vol||0.3, a.currentTime);
    gn.gain.exponentialRampToValueAtTime(0.001, a.currentTime+dur);
    s.connect(f); f.connect(gn); gn.connect(a.destination); s.start(); s.stop(a.currentTime+dur+0.05);
  } catch(e) {}
}
var SFX = {
  jump:    function(){ sfxTone(200,0.05,'square',0.15); setTimeout(function(){ sfxTone(260,0.08,'square',0.12); },50); },
  land:    function(){ sfxNoise(0.08,0.25,150); },
  blast:   function(){ sfxTone(600,0.05,'sine',0.18); sfxNoise(0.06,0.14,600); },
  stomp:   function(){ sfxNoise(0.15,0.4,140); sfxTone(90,0.1,'sine',0.22); },
  hurt:    function(){ sfxTone(130,0.22,'sawtooth',0.28); sfxNoise(0.18,0.22,180); },
  soul:    function(){ sfxTone(880,0.07,'sine',0.12); setTimeout(function(){ sfxTone(1100,0.09,'sine',0.1); },80); },
  oneup:   function(){ var ns=[330,392,523,659,784]; ns.forEach(function(f,i){ setTimeout(function(){ sfxTone(f,0.14,'sine',0.18); },i*80); }); },
  groan:   function(){ sfxTone(60+Math.random()*30,0.5,'sawtooth',0.12); },
  emerge:  function(){ sfxNoise(0.3,0.35,100); sfxTone(80,0.3,'sawtooth',0.15); },
  sword:   function(){ sfxNoise(0.18,0.3,500); sfxTone(200,0.12,'sawtooth',0.18); },
  slam:    function(){ sfxNoise(0.25,0.45,100); sfxTone(70,0.3,'sine',0.3); },
  win:     function(){ var ns=[220,277,330,440,554,660]; ns.forEach(function(f,i){ setTimeout(function(){ sfxTone(f,0.28,'sine',0.18); },i*170); }); },
  boss:    function(){ sfxNoise(0.3,0.35,100); sfxTone(55,0.45,'sawtooth',0.3); },
};

// ============================================================
//  WORLD GENERATION
// ============================================================
var seed = 42;
function rnd() { seed=(seed*1664525+1013904223)|0; return ((seed>>>0)/4294967295); }
function ri(a,b) { return Math.floor(rnd()*(b-a)+a); }

var platforms = [];
var graves    = [];
var souls     = [];
var vials     = [];
var bgTrees   = [];

// Ground
platforms.push({x:0, y:FLOOR, w:WORLD, h:20, ground:true});

// Floating stone platforms
var px = 260;
while (px < WORLD - 500) {
  var pw = ri(70,170), py = FLOOR - ri(70,190);
  platforms.push({x:px, y:py, w:pw, h:14, ground:false});
  // Souls on platform
  for (var sx2 = px+12; sx2 < px+pw-12; sx2+=28) {
    if (rnd()<0.65) souls.push({x:sx2, y:py-22, alive:true, bob:rnd()*6.28});
  }
  if (rnd()<0.14) vials.push({x:px+pw/2, y:py-26, alive:true});
  px += ri(110,260);
}

// Graves (with zombie spawn data)
var ZOMBIE_TYPES = [
  {name:'ZomCat',  col:'#2a3a18', eye:'#ff3300', spd:1.1, hp:1, pts:150, sz:28},
  {name:'ZomFox',  col:'#3a1a08', eye:'#ff4400', spd:1.5, hp:1, pts:200, sz:28},
  {name:'ZomBear', col:'#2a1a08', eye:'#ff2200', spd:0.7, hp:2, pts:300, sz:36},
  {name:'ZomWolf', col:'#1a1a2a', eye:'#cc00ff', spd:1.4, hp:1, pts:200, sz:30},
  {name:'ZomRat',  col:'#2a2a1a', eye:'#ff0000', spd:1.7, hp:1, pts:150, sz:24},
  {name:'ZomOwl',  col:'#1a1a18', eye:'#00aaff', spd:1.0, hp:1, pts:150, sz:26},
  {name:'ZomBoar', col:'#2a1808', eye:'#ff3300', spd:1.2, hp:2, pts:300, sz:34},
  {name:'ZomCrow', col:'#101010', eye:'#cc00cc', spd:1.6, hp:1, pts:150, sz:24},
];
for (var gi=0; gi<55; gi++) {
  var gx = 300 + gi*(WORLD/57) + ri(-40,40);
  var gtype = ZOMBIE_TYPES[ri(0,ZOMBIE_TYPES.length)];
  graves.push({
    x:gx, y:FLOOR, w:32, h:40,
    state:'idle',  // idle -> shaking -> emerging -> done
    timer:0, emergeY:0,
    zombie: null,
    type: gtype,
    shakeX: 0,
  });
}

// Background dead trees
for (var ti=0; ti<90; ti++) {
  bgTrees.push({x: ti*(WORLD/90)+ri(0,50), layer: 0.25+rnd()*0.7, sc: 0.5+rnd()*0.9, type:ri(0,3)});
}

// Pre-spawned enemies (not from graves — patrol from start)
var enemies = [];
for (var ei=0; ei<20; ei++) {
  var et = ZOMBIE_TYPES[ri(0,ZOMBIE_TYPES.length)];
  var ex = 250 + ei*240 + ri(-40,40);
  var ey = FLOOR - et.sz;
  enemies.push({
    x:ex, y:ey, vx:-et.spd, vy:0, w:et.sz, h:et.sz,
    onGround:false, dir:-1, alive:true, deathAnim:0,
    stunTimer:0, hp:et.hp, initHp:et.hp,
    col:et.col, eye:et.eye, spd:et.spd, pts:et.pts,
    wobble:rnd()*6.28,
  });
}

// BOSS
var BOSS_X = WORLD - 750;
var boss = {
  x:BOSS_X, y:FLOOR-115, vx:1.8, vy:0, w:90, h:115,
  hp:16, maxHp:16, alive:true, active:false, dead:false, deathTimer:0,
  dir:1, timer:0, hitTimer:0,
  swordAngle:0, swinging:false, swingDir:1, swingCd:100, swingTimer:0,
  jumpCd:260, shootCd:90,
  projs:[], shockwaves:[],
};

// ============================================================
//  PLAYER
// ============================================================
var P = {
  x:100, y:FLOOR-60, vx:0, vy:0, w:36, h:50,
  onGround:false, dir:1,
  lives:5, souls:0, score:0,
  invTimer:0, blastCd:0,
  dead:false, deathVy:0,
  blasts:[],
};

// ============================================================
//  GAME STATE
// ============================================================
var cam = 0;
var state = 'play'; // play / over / win
var particles = [];
var tick = 0;
var keys = {};
var groanTimer = 200;

document.addEventListener('keydown', function(e) {
  keys[e.code] = true;
  startMusic();
  if (state !== 'play') { if (e.code==='Space'||e.code==='Enter') restart(); return; }
  if (P.dead) return;
  if ((e.code==='Space'||e.code==='ArrowUp'||e.code==='KeyW') && P.onGround) {
    P.vy = -13.5; P.onGround = false; SFX.jump();
  }
  if ((e.code==='KeyZ'||e.code==='KeyF') && P.blastCd<=0) {
    P.blasts.push({x:P.x+P.w/2, y:P.y+P.h*0.35, vx:P.dir*11, vy:-1.5, alive:true, bounces:0, rot:0});
    P.blastCd = 16; SFX.blast();
  }
});
document.addEventListener('keyup', function(e) { delete keys[e.code]; });
document.addEventListener('click', function() { startMusic(); }, {once:true});

// ============================================================
//  HELPERS
// ============================================================
function scx(wx) { return wx - cam; }

function landOn(ex, ey, ew, eh, evy) {
  for (var i=0; i<platforms.length; i++) {
    var p = platforms[i];
    if (ex+ew > p.x && ex < p.x+p.w &&
        ey+eh > p.y && ey+eh < p.y+p.h+Math.abs(evy)+4 && evy>=0) return p;
  }
  return null;
}

function burst(wx, wy, col, n) {
  n = n||6;
  for (var i=0; i<n; i++) {
    var a = Math.random()*6.28, spd = 2+Math.random()*4;
    particles.push({x:wx, y:wy, vx:Math.cos(a)*spd, vy:Math.sin(a)*spd-3, col:col, life:0, max:30+Math.random()*25});
  }
}

// ============================================================
//  DRAW HELPERS
// ============================================================
function fillRR(x,y,w,h,r,col) { g.beginPath(); g.roundRect(x,y,w,h,r); g.fillStyle=col; g.fill(); }
function strokeRR(x,y,w,h,r,col,lw) { g.beginPath(); g.roundRect(x,y,w,h,r); g.strokeStyle=col; g.lineWidth=lw||2; g.stroke(); }
function fillCirc(x,y,r,col) { g.beginPath(); g.arc(x,y,r,0,6.28); g.fillStyle=col; g.fill(); }
function label(s,x,y,col,sz,al) { g.font='bold '+(sz||13)+'px monospace'; g.textAlign=al||'center'; g.fillStyle=col||'#ccc'; g.fillText(s,x,y); }

// ============================================================
//  BACKGROUND DRAWING
// ============================================================
function drawBG() {
  // Sky
  var sk = g.createLinearGradient(0,0,0,FLOOR);
  sk.addColorStop(0,'#020005'); sk.addColorStop(0.6,'#08031a'); sk.addColorStop(1,'#100516');
  g.fillStyle=sk; g.fillRect(0,0,W,H);

  // Lightning flash
  if (Math.random()<0.003) { g.fillStyle='rgba(180,160,255,0.18)'; g.fillRect(0,0,W,H); SFX.jump(); }

  // Blood moon
  var mx=W*0.78, my=62;
  var mg=g.createRadialGradient(mx,my,0,mx,my,36);
  mg.addColorStop(0,'#cc3322'); mg.addColorStop(0.6,'#880808'); mg.addColorStop(1,'#440000');
  g.fillStyle=mg; g.beginPath(); g.arc(mx,my,36,0,6.28); g.fill();
  var glow=g.createRadialGradient(mx,my,28,mx,my,80);
  glow.addColorStop(0,'rgba(140,20,10,0.22)'); glow.addColorStop(1,'rgba(0,0,0,0)');
  g.fillStyle=glow; g.beginPath(); g.arc(mx,my,80,0,6.28); g.fill();

  // Far mountain silhouette
  g.fillStyle='#060206';
  g.beginPath(); g.moveTo(0,FLOOR-20);
  for (var x=0; x<=W; x+=10) {
    g.lineTo(x, FLOOR-20 - Math.abs(Math.sin((x+cam*0.07)*0.006)*85 + Math.sin((x+cam*0.04)*0.014)*45));
  }
  g.lineTo(W,H); g.lineTo(0,H); g.closePath(); g.fill();

  // Background trees (parallax)
  bgTrees.forEach(function(t) {
    var bsx = scx(t.x)*t.layer + W*(1-t.layer)*0.5;
    if (bsx<-100||bsx>W+100) return;
    g.save(); g.translate(bsx, FLOOR); g.scale(t.sc, t.sc);
    g.strokeStyle='#150a04'; g.lineCap='round';
    // Trunk
    g.lineWidth=5; g.beginPath(); g.moveTo(0,0); g.lineTo(0,-65); g.stroke();
    // Branches
    g.lineWidth=2.5;
    var brs = [[-22,-50,14],[-15,-38,-18],[18,-52,10],[10,-36,-14],[0,-65,-20],[0,-58,16]];
    for (var bi=0; bi<brs.length; bi++) {
      g.beginPath(); g.moveTo(0,brs[bi][1]); g.lineTo(brs[bi][0],brs[bi][1]+brs[bi][2]*0.4); g.stroke();
    }
    g.restore();
  });

  // Fog
  var fog=g.createLinearGradient(0,FLOOR-90,0,FLOOR+10);
  fog.addColorStop(0,'rgba(10,4,20,0)'); fog.addColorStop(0.5,'rgba(10,4,20,0.4)'); fog.addColorStop(1,'rgba(10,4,20,0.75)');
  g.fillStyle=fog; g.fillRect(0,FLOOR-90,W,160);
}

function drawWorld() {
  // Platforms
  platforms.forEach(function(p) {
    var psx=scx(p.x); if (psx+p.w<-10||psx>W+10) return;
    if (p.ground) {
      g.fillStyle='#0c0905'; g.fillRect(psx,p.y,p.w,p.h+H);
      g.fillStyle='#1a110a'; g.fillRect(psx,p.y,p.w,5);
      g.strokeStyle='#141008'; g.lineWidth=1;
      for (var gx=psx; gx<psx+p.w; gx+=20) {
        g.beginPath(); g.moveTo(gx,p.y); g.lineTo(gx-3,p.y-8); g.stroke();
        g.beginPath(); g.moveTo(gx+6,p.y); g.lineTo(gx+9,p.y-10); g.stroke();
      }
    } else {
      for (var bx=0; bx<p.w; bx+=22) fillRR(psx+bx,p.y,20,p.h,1,'#232323');
      g.fillStyle='#2e2e2e'; g.fillRect(psx,p.y,p.w,3);
    }
  });

  // Graves
  graves.forEach(function(gr) {
    var gsx=scx(gr.x)+gr.shakeX; if (gsx<-40||gsx>W+40) return;
    var gy=FLOOR-38;
    // Stone slab
    fillRR(gsx-16,gy,32,38,3,'#1c1c1c'); fillRR(gsx-18,gy-12,36,16,4,'#242424');
    strokeRR(gsx-18,gy-12,36,16,4,'#111',1);
    // Cross etching
    g.strokeStyle='#333'; g.lineWidth=1.5;
    g.beginPath(); g.moveTo(gsx,gy-10); g.lineTo(gsx,gy+4); g.stroke();
    g.beginPath(); g.moveTo(gsx-7,gy-5); g.lineTo(gsx+7,gy-5); g.stroke();
    // Dirt mound
    g.fillStyle='#1a1008'; g.beginPath(); g.ellipse(gsx,FLOOR+2,22,8,0,Math.PI,0); g.fill();
    // Emerging zombie peek
    if (gr.state==='emerging' && gr.zombie) {
      var z=gr.zombie, peekAmt=gr.emergeY; // 0=buried,1=full
      var peekH=Math.round(z.h*peekAmt);
      var zy=FLOOR-peekH;
      g.save(); g.rect(gsx-z.w/2,zy,z.w,peekH+10); g.clip();
      drawZombieAt(scx(z.x), zy, z, 1, false);
      g.restore();
    }
  });

  // Souls
  souls.forEach(function(s) {
    if (!s.alive) return;
    var csx=scx(s.x); if (csx<-20||csx>W+20) return;
    s.bob+=0.1;
    var cy=s.y+Math.sin(s.bob)*5;
    var sg=g.createRadialGradient(csx,cy,0,csx,cy,8);

// ============================================================
//  UPDATE
// ============================================================
function update() {
  tick++;

  // Ambient groans
  groanTimer--;
  if (groanTimer<=0) { groanTimer=ri(200,500); if (Math.random()<0.5) SFX.groan(); }

  // Camera scroll
  if (!boss.active && !P.dead) cam=Math.min(cam+0.65, WORLD-W);

  // --- Player dead fall ---
  if (P.dead) {
    P.deathVy+=0.5; P.y+=P.deathVy;
    if (P.y > H+80) {
      P.lives--;
      if (P.lives<=0) { state='over'; return; }
      P.x=cam+80; P.y=FLOOR-60; P.vy=0; P.vx=0; P.dead=false; P.invTimer=180;
    }
    return;
  }

  // --- Player movement ---
  if (keys['ArrowLeft']||keys['KeyA']) { P.vx-=P.onGround?1.8:1.0; P.dir=-1; }
  if (keys['ArrowRight']||keys['KeyD']) { P.vx+=P.onGround?1.8:1.0; P.dir=1; }
  P.vx*=P.onGround?0.8:0.92;
  P.vy=Math.min(P.vy+GRAVITY,14);
  P.x+=P.vx; P.y+=P.vy;
  var tc=P.x-W*0.35; if (tc>cam) cam=Math.min(tc,WORLD-W); cam=Math.max(0,cam);
  if (P.x<cam+20) P.x=cam+20;
  if (P.x+P.w>cam+W-20) P.x=cam+W-P.w-20;
  P.onGround=false;
  var pp=landOn(P.x,P.y,P.w,P.h,P.vy);
  if (pp) { P.y=pp.y-P.h; P.vy=0; P.onGround=true; }
  if (P.y>H+20) { P.dead=true; P.deathVy=-8; SFX.hurt(); }
  if (P.invTimer>0) P.invTimer--;
  if (P.blastCd>0) P.blastCd--;

  // --- Spirit blasts ---
  for (var bi=P.blasts.length-1;bi>=0;bi--) {
    var b=P.blasts[bi];
    if (!b.alive) { P.blasts.splice(bi,1); continue; }
    b.x+=b.vx; b.y+=b.vy; b.vy+=0.3; b.rot+=0.28;
    if (b.y>=FLOOR-4) { b.vy=-5; b.bounces++; if (b.bounces>3) b.alive=false; }
    if (b.x<cam-40||b.x>cam+W+40) b.alive=false;
    // Hit enemies
    for (var ei2=0;ei2<enemies.length;ei2++) {
      var e=enemies[ei2];
      if (!e.alive||!b.alive) continue;
      if (Math.abs(b.x-e.x-e.w/2)<e.w/2+8 && Math.abs(b.y-e.y-e.h/2)<e.h/2+8) {
        e.hp--; b.alive=false; SFX.stomp(); burst(e.x+e.w/2,e.y,'#660000',5);
        if (e.hp<=0) { e.alive=false; P.score+=e.pts; burst(e.x+e.w/2,e.y,'#440000',8); }
      }
    }
    // Hit boss
    if (b.alive&&boss.active&&boss.alive&&!boss.dead) {
      if (Math.abs(b.x-(boss.x+boss.w/2))<boss.w/2+10 && Math.abs(b.y-(boss.y+boss.h/2))<boss.h/2+10) {
        boss.hp--; boss.hitTimer=18; b.alive=false; SFX.hurt(); burst(boss.x+boss.w/2,boss.y,'#4400aa',6);
        if (boss.hp<=0) { boss.dead=true; boss.deathTimer=1; SFX.win(); P.score+=8000; burst(boss.x+boss.w/2,boss.y,'#880000',16); setTimeout(function(){ state='win'; },3000); }
      }
    }
  }

  // --- Souls & vials ---
  for (var si=0;si<souls.length;si++) {
    var s=souls[si]; if (!s.alive) continue;
    if (Math.abs(s.x-P.x-P.w/2)<22&&Math.abs(s.y-P.y-P.h/2)<28) {
      s.alive=false; P.souls++; P.score+=10; SFX.soul();
      if (P.souls%80===0) { P.lives=Math.min(P.lives+1,8); SFX.oneup(); }
    }
  }
  for (var vi=0;vi<vials.length;vi++) {
    var v=vials[vi]; if (!v.alive) continue;
    if (Math.abs(v.x-P.x-P.w/2)<22&&Math.abs(v.y-P.y-P.h/2)<30) {
      v.alive=false; P.lives=Math.min(P.lives+1,8); SFX.oneup();
    }
  }

  // --- Grave emergence ---
  for (var gi2=0;gi2<graves.length;gi2++) {
    var gr=graves[gi2]; if (gr.state==='done') continue;
    var dist=Math.abs(gr.x - (P.x+cam)); // world distance
    if (gr.state==='idle' && dist < W*0.6) {
      gr.state='shaking'; gr.timer=60; SFX.emerge();
    }
    if (gr.state==='shaking') {
      gr.shakeX=Math.floor(Math.random()*7-3);
      gr.timer--;
      burst(gr.x,FLOOR-10,'#2a1808',1);
      if (gr.timer<=0) {
        gr.state='emerging'; gr.emergeY=0; gr.shakeX=0;
        var zt=gr.type;
        var zz={x:gr.x-zt.sz/2, y:FLOOR-zt.sz, vx:-zt.spd, vy:0, w:zt.sz, h:zt.sz,
                onGround:false, dir:-1, alive:true, deathAnim:0, stunTimer:0,
                hp:zt.hp, initHp:zt.hp, col:zt.col, eye:zt.eye, spd:zt.spd, pts:zt.pts, wobble:Math.random()*6.28};
        gr.zombie=zz; enemies.push(zz);
      }
    }
    if (gr.state==='emerging') {
      gr.emergeY+=0.025; // 0 to 1
      if (gr.emergeY>=1) { gr.emergeY=1; gr.state='done'; }
    }
  }

  // --- Enemy AI ---
  for (var ei3=0;ei3<enemies.length;ei3++) {
    var e2=enemies[ei3]; if (!e2.alive) continue;
    if (Math.abs(e2.x - (cam+W/2)) > W+80) continue;
    if (e2.stunTimer>0) { e2.stunTimer--; continue; }
    e2.x+=e2.vx; e2.vy=Math.min(e2.vy+GRAVITY,14); e2.y+=e2.vy;
    var ep=landOn(e2.x,e2.y,e2.w,e2.h,e2.vy);
    if (ep) { e2.y=ep.y-e2.h; e2.vy=0; e2.onGround=true; }
    if (e2.y>H+50) { e2.y=FLOOR-e2.h; e2.vy=0; }
    // Reverse direction at edges
    if (e2.x<cam-120||e2.x>cam+W+100) { e2.vx*=-1; e2.dir*=-1; }
    if (e2.x<10) { e2.vx=Math.abs(e2.vx); e2.dir=1; }
    if (e2.x+e2.w>WORLD-10) { e2.vx=-Math.abs(e2.vx); e2.dir=-1; }
    // Collision with player
    if (P.invTimer>0) continue;
    var dx2=P.x+P.w/2-(e2.x+e2.w/2), dy2=P.y+P.h-(e2.y+e2.h*0.5);
    if (Math.abs(dx2)<e2.w/2+12 && Math.abs(dy2)<e2.h/2+18) {
      if (P.vy>0 && P.y+P.h < e2.y+e2.h*0.42) {
        e2.hp--; P.vy=-9; SFX.stomp(); burst(e2.x+e2.w/2,e2.y,'#660000',5);
        if (e2.hp<=0) { e2.alive=false; P.score+=e2.pts; burst(e2.x+e2.w/2,e2.y,'#880000',8); }
        else e2.stunTimer=55;
      } else {
        P.invTimer=130; P.vy=-6; P.vx=dx2>0?-4:4; SFX.hurt();
        P.lives--; burst(P.x+P.w/2,P.y,'#660000',4);
        if (P.lives<=0) { P.dead=true; P.deathVy=-10; state='over'; }
      }
    }
  }

  // --- Boss ---
  if (P.x>BOSS_X-W*0.8 && !boss.active && boss.alive) { boss.active=true; SFX.boss(); burst(BOSS_X+boss.w/2,FLOOR-80,'#880000',12); }
  if (boss.active && boss.alive && !boss.dead) {
    boss.timer++; var enr=boss.hp<=boss.maxHp/2;
    boss.x+=boss.vx*(enr?1.5:1); boss.vy=Math.min(boss.vy+GRAVITY,14); boss.y+=boss.vy;
    var bpp=landOn(boss.x,boss.y,boss.w,boss.h,boss.vy); if (bpp) { boss.y=bpp.y-boss.h; boss.vy=0; }
    if (boss.x<BOSS_X-280) { boss.vx=Math.abs(boss.vx); boss.dir=1; }
    if (boss.x>BOSS_X+220) { boss.vx=-Math.abs(boss.vx); boss.dir=-1; }
    if (boss.hitTimer>0) boss.hitTimer--;
    // Sword swing
    if (!boss.swinging) {
      boss.swingCd--; boss.swordAngle*=0.85;
      if (boss.swingCd<=0 && Math.abs(P.x-(boss.x+boss.w/2))<300) {
        boss.swinging=true; boss.swingDir=P.x<boss.x?-1:1; boss.swingTimer=22; boss.swingCd=80+(enr?-25:0); SFX.sword();
      }
    } else {
      boss.swingTimer--; boss.swordAngle+=boss.swingDir*0.22*(enr?1.6:1);
      if (boss.swingTimer<=0) { boss.swinging=false; boss.shockwaves.push({x:boss.x+boss.w/2,r:10,alpha:0.9,speed:4}); SFX.slam(); }
    }
    // Sword tip hitbox
    var stx=boss.x+boss.w*0.5+Math.sin(boss.swordAngle+0.2)*88*boss.dir;
    var sty=boss.y+boss.h*0.3-Math.cos(boss.swordAngle+0.2)*88;
    if (boss.swinging && P.invTimer<=0 && Math.abs(stx-(P.x+P.w/2))<26 && Math.abs(sty-(P.y+P.h/2))<26) {
      P.invTimer=140; P.vy=-7; P.vx=P.x<boss.x?-6:6; SFX.hurt(); P.lives--; burst(P.x+P.w/2,P.y,'#880000',5); if (P.lives<=0) { P.dead=true; P.deathVy=-10; }
    }
    // Jump
    boss.jumpCd--; if (boss.jumpCd<=0&&Math.abs(P.x-(boss.x+boss.w/2))<360) { boss.vy=-(enr?15:12); boss.jumpCd=200+(enr?-70:0); SFX.boss(); }
    // Bone throw
    boss.shootCd--; if (boss.shootCd<=0) { var bd2=P.x<boss.x?-1:1; boss.projs.push({x:boss.x+boss.w/2,y:boss.y+boss.h*0.25,vx:bd2*(enr?7:5),vy:-4,rot:0,alive:true}); boss.shootCd=enr?50:85; }
    // Update projs
    for (var pi=boss.projs.length-1;pi>=0;pi--) {
      var bp=boss.projs[pi]; bp.x+=bp.vx; bp.y+=bp.vy; bp.vy+=0.35; bp.rot+=0.22;
      if (bp.y>FLOOR) { boss.projs.splice(pi,1); continue; }
      if (P.invTimer<=0&&Math.abs(bp.x-(P.x+P.w/2))<20&&Math.abs(bp.y-(P.y+P.h/2))<20) {
        boss.projs.splice(pi,1); P.invTimer=110; P.vy=-5; P.vx=bp.vx>0?-4:4; SFX.hurt(); P.lives--; burst(P.x+P.w/2,P.y,'#660000',4); if (P.lives<=0) { P.dead=true; P.deathVy=-10; }
      }
    }
    // Shockwaves
    for (var swi=boss.shockwaves.length-1;swi>=0;swi--) {
      var sw=boss.shockwaves[swi]; sw.r+=sw.speed; sw.alpha-=0.025;
      if (sw.alpha<=0) { boss.shockwaves.splice(swi,1); continue; }
      if (P.invTimer<=0) { var dd=Math.abs(P.x+P.w/2-sw.x); if (Math.abs(dd-sw.r)<22&&P.y+P.h>FLOOR-14) { P.invTimer=100; P.vy=-8; P.vx=P.x<sw.x?-4:4; SFX.hurt(); P.lives--; if (P.lives<=0) { P.dead=true; P.deathVy=-10; } } }
    }
    // Stomp boss
    if (P.vy>0&&P.y+P.h<boss.y+boss.h*0.28&&Math.abs(P.x+P.w/2-(boss.x+boss.w/2))<boss.w/2+10) {
      boss.hp--; boss.hitTimer=22; P.vy=-10; SFX.stomp(); burst(boss.x+boss.w/2,boss.y,'#660000',8);
      if (boss.hp<=0) { boss.dead=true; boss.deathTimer=1; SFX.win(); P.score+=8000; setTimeout(function(){ state='win'; },3000); }
    }
    // Body touch
    if (P.invTimer<=0&&Math.abs(P.x+P.w/2-(boss.x+boss.w/2))<boss.w/2+14&&Math.abs(P.y+P.h/2-(boss.y+boss.h/2))<boss.h/2+20) {
      if (!(P.vy>0&&P.y+P.h<boss.y+boss.h*0.28)) { P.invTimer=130; P.vy=-6; P.vx=P.x<boss.x?-5:5; SFX.hurt(); P.lives--; burst(P.x+P.w/2,P.y,'#660000',4); if (P.lives<=0) { P.dead=true; P.deathVy=-10; } }
    }
    if (boss.dead && boss.deathTimer<200) boss.deathTimer++;
  }

  // Particles
  for (var pi2=particles.length-1;pi2>=0;pi2--) {
    var p2=particles[pi2]; p2.x+=p2.vx; p2.y+=p2.vy; p2.vy+=0.2; p2.life++;
    if (p2.life>=p2.max) particles.splice(pi2,1);
  }
}

// ============================================================
//  OVERLAYS
// ============================================================
function drawEnemies() {
  for (var i=0;i<enemies.length;i++) {
    var e=enemies[i];
    var esx=scx(e.x); if (esx<-70||esx>W+70) continue;
    if (!e.alive) {
      if (e.deathAnim<18) { drawZombieAt(esx,e.y,e,Math.max(0,1-e.deathAnim/18),false); e.deathAnim++; }
      continue;
    }
    var alpha=e.stunTimer>0&&Math.floor(tick/3)%2?0.4:1;
    drawZombieAt(esx,e.y,e,alpha,true);
    // Multi-HP indicator
    if (e.initHp>1) { for (var hi=0;hi<e.hp;hi++) fillCirc(esx+e.w/2-e.initHp*5+hi*9,e.y-14,3,'#aa0000'); }
  }
}

function drawOver() {
  g.fillStyle='rgba(0,0,0,0.9)'; g.fillRect(0,0,W,H);
  label('YOU DIED',W/2,H/2-48,'#880000',52);
  g.strokeStyle='#440000'; g.lineWidth=2; g.beginPath(); g.moveTo(W/2-130,H/2-28); g.lineTo(W/2+130,H/2-28); g.stroke();
  label('Souls: '+P.souls+'   Score: '+P.score,W/2,H/2+6,'#aa5555',16);
  label('SPACE or ENTER to try again',W/2,H/2+46,'#663333',13);
}

function drawWin() {
  g.fillStyle='rgba(0,0,0,0.92)'; g.fillRect(0,0,W,H);
  label('THE KING IS DEAD',W/2,H/2-52,'#aa2222',34);
  g.strokeStyle='#440000'; g.lineWidth=1; g.beginPath(); g.moveTo(W/2-150,H/2-30); g.lineTo(W/2+150,H/2-30); g.stroke();
  label('The dead finally rest.',W/2,H/2-4,'#886666',15);
  label('Souls: '+P.souls+'   Score: '+P.score+'   Lives: '+P.lives,W/2,H/2+34,'#664444',13);
  label('SPACE or ENTER to play again',W/2,H/2+70,'#442222',12);
}

// ============================================================
//  RESTART
// ============================================================
function restart() {
  P.x=100; P.y=FLOOR-60; P.vx=0; P.vy=0; P.onGround=false; P.dir=1;
  P.lives=5; P.souls=0; P.score=0; P.invTimer=0; P.blastCd=0;
  P.dead=false; P.blasts=[];
  cam=0; state='play'; tick=0; particles=[];
  souls.forEach(function(s){ s.alive=true; });
  vials.forEach(function(v){ v.alive=true; });
  graves.forEach(function(gr){ gr.state='idle'; gr.timer=0; gr.emergeY=0; gr.zombie=null; gr.shakeX=0; });
  enemies.length=0;
  for (var ei4=0;ei4<20;ei4++) {
    var et2=ZOMBIE_TYPES[ri(0,ZOMBIE_TYPES.length)];
    var ex2=250+ei4*240+ri(-40,40);
    enemies.push({x:ex2, y:FLOOR-et2.sz, vx:-et2.spd, vy:0, w:et2.sz, h:et2.sz,
                  onGround:false, dir:-1, alive:true, deathAnim:0, stunTimer:0,
                  hp:et2.hp, initHp:et2.hp, col:et2.col, eye:et2.eye, spd:et2.spd, pts:et2.pts, wobble:rnd()*6.28});
  }
  boss.x=BOSS_X; boss.y=FLOOR-115; boss.vx=1.8; boss.vy=0; boss.hp=16; boss.alive=true;
  boss.active=false; boss.dead=false; boss.deathTimer=0; boss.dir=1; boss.timer=0; boss.hitTimer=0;
  boss.swordAngle=0; boss.swinging=false; boss.swingCd=100; boss.swingTimer=0;
  boss.jumpCd=260; boss.shootCd=90; boss.projs=[]; boss.shockwaves=[];
}

// ============================================================
//  MAIN LOOP
// ============================================================
function loop() {
  requestAnimationFrame(loop);
  if (state==='play') update();
  drawBG();
  drawWorld();
  drawEnemies();
  drawBoss();
  drawBlasts();
  drawPlayer();
  drawParticles();
  drawHUD();
  if (state==='over') drawOver();
  if (state==='win')  drawWin();
}

// ============================================================
//  TOUCH CONTROLS
// ============================================================
(function() {
  // Show touch UI only on touch devices
  var hasTouch = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
  if (hasTouch) {
    document.getElementById('touch-ui').style.display = 'block';
    document.getElementById('ui').style.display = 'none';
  }

  // Map button id -> synthetic key code
  var BTN_KEYS = {
    'btn-left':  'ArrowLeft',
    'btn-right': 'ArrowRight',
    'btn-jump':  'Space',
    'btn-blast': 'KeyZ',
  };

  function press(code) {
    if (code === 'Space' || code === 'ArrowUp') {
      // Jump: fire keydown and handle in existing listener
      var ev = new KeyboardEvent('keydown', {code: code, bubbles: true});
      document.dispatchEvent(ev);
    }
    if (code === 'KeyZ') {
      var ev2 = new KeyboardEvent('keydown', {code: code, bubbles: true});
      document.dispatchEvent(ev2);
    }
    keys[code] = true;
  }
  function release(code) {
    delete keys[code];
    var ev = new KeyboardEvent('keyup', {code: code, bubbles: true});
    document.dispatchEvent(ev);
  }

  Object.keys(BTN_KEYS).forEach(function(id) {
    var el = document.getElementById(id);
    var code = BTN_KEYS[id];
    if (!el) return;

    el.addEventListener('touchstart', function(e) {
      e.preventDefault(); startMusic(); press(code);
      el.classList.add('pressed');
    }, {passive: false});

    el.addEventListener('touchend', function(e) {
      e.preventDefault(); release(code);
      el.classList.remove('pressed');
    }, {passive: false});

    el.addEventListener('touchcancel', function(e) {
      e.preventDefault(); release(code);
      el.classList.remove('pressed');
    }, {passive: false});
  });

  // Prevent page scroll/zoom during gameplay
  document.addEventListener('touchmove', function(e) { e.preventDefault(); }, {passive: false});
}());

loop();
</script>
